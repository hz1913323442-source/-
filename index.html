<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考多元升学路径全解析</title>
    <!-- 引入 React, ReactDOM, Babel (用于浏览器解析JSX), 和 Tailwind CSS -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide 图标 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', "Microsoft YaHei", sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        // 定义图标组件 (因为在浏览器环境，直接使用 lucide 对象)
        const Icon = ({ name, className }) => {
            const [svg, setSvg] = useState('');
            useEffect(() => {
                const icon = lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        const mindMapData = {
            name: "中国高考多元升学",
            color: "bg-blue-600",
            children: [
                {
                    name: "拔尖与综合评价",
                    color: "bg-indigo-500",
                    description: "针对学霸及综合素质优秀者",
                    children: [
                        { name: "强基计划", detail: "85%高考 + 15%校测。基础学科拔尖人才，本硕博衔接培养。" },
                        { name: "综合评价", detail: "631模式。综合素质高、课外实践丰富，专业选择面更广。" }
                    ]
                },
                {
                    name: "政策定向专项",
                    color: "bg-emerald-500",
                    description: "促进教育公平的政策照顾",
                    children: [
                        { name: "国家专项", detail: "面向脱贫地区，部属/双一流高校承担。" },
                        { name: "地方专项", detail: "面向本省农村学生，省属重点高校承担。" },
                        { name: "高校专项", detail: "面向边远/农村勤奋生，独立申请，单独划线。" }
                    ]
                },
                {
                    name: "特长与免试类",
                    color: "bg-amber-500",
                    description: "拥有特殊天赋或长期专业训练",
                    children: [
                        { name: "保送生", detail: "奥赛国家队、外国语学校优等生、优秀运动员。直接免试入读。" },
                        { name: "艺术/体育类", detail: "专业课统考/校考 + 高考文化课。对文化课要求逐年提高。" }
                    ]
                },
                {
                    name: "国际/港澳类",
                    color: "bg-rose-500",
                    description: "跨境教育与国际化背景",
                    children: [
                        { name: "中外合作办学", detail: "不出国的留学，获得两校学位。费用较高，英语环境。" },
                        { name: "港澳高校", detail: "统招提前批或自主招生。部分学校需全英文面试。" }
                    ]
                },
                {
                    name: "职业与提前录取",
                    color: "bg-slate-500",
                    description: "实用技能与灵活路径",
                    children: [
                        { name: "高职单招", detail: "春季自主考试，录取后无需参加6月高考。侧重技能实操。" }
                    ]
                }
            ]
        };

        const FormattedText = ({ text }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className="flex flex-col gap-1.5">
                    {lines.map((line, lineIdx) => {
                        let content = line.trim();
                        if (!content) return <div key={lineIdx} className="h-2" />;
                        let className = "text-[13px] leading-relaxed text-slate-700";
                        if (content.startsWith('#### ')) {
                            content = content.replace('#### ', '');
                            className = "text-[13px] font-bold mt-2 text-slate-800 flex items-center gap-1.5 before:content-[''] before:w-1 before:h-3 before:bg-blue-400 before:rounded-full";
                        } else if (content.startsWith('### ')) {
                            content = content.replace('### ', '');
                            className = "text-sm font-bold mt-3 mb-1 text-blue-700 border-b border-blue-50 pb-1 flex items-center gap-2";
                        } else if (content.startsWith('## ')) {
                            content = content.replace('## ', '');
                            className = "text-base font-extrabold mt-4 mb-2 text-slate-900 flex items-center gap-2";
                        }
                        const parts = content.split(/(\*\*.*?\*\*)/g);
                        return (
                            <div key={lineIdx} className={className}>
                                {parts.map((part, i) => {
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                        return <strong key={i} className="font-bold text-blue-800 px-0.5 bg-blue-50 rounded">{part.slice(2, -2)}</strong>;
                                    }
                                    return part;
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const Node = ({ node, isRoot = false, isChild = false }) => (
            <div className="flex flex-col items-center">
                <div className={`relative p-4 rounded-xl shadow-lg border-2 transition-all cursor-default group
                    ${isRoot ? 'bg-blue-600 text-white border-blue-700 text-xl font-bold' : 
                    isChild ? 'bg-white text-slate-800 border-slate-200 hover:border-blue-300' : 
                    `${node.color} text-white border-opacity-20 font-semibold`}
                    min-w-[140px] max-w-[180px] text-center`}>
                    {node.name}
                    {node.description && <div className="text-[10px] opacity-80 mt-1 font-normal leading-tight">{node.description}</div>}
                    {node.detail && (
                        <div className="hidden group-hover:block absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-56 p-3 bg-slate-900 text-white text-xs rounded-lg z-50 shadow-2xl">
                            <div className="font-bold mb-1 border-b border-slate-700 pb-1">{node.name}</div>
                            {node.detail}
                            <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-2 h-2 bg-slate-900 rotate-45"></div>
                        </div>
                    )}
                </div>
                {node.children && (
                    <div className="flex flex-col items-center">
                        <div className="w-px h-8 bg-slate-300"></div>
                        <div className="flex space-x-6">
                            {node.children.map((child, idx) => (
                                <div key={idx} className="relative flex flex-col items-center">
                                    <div className="absolute top-0 left-0 right-0 flex justify-center">
                                        {idx !== 0 && <div className="absolute top-0 right-1/2 w-1/2 h-px bg-slate-300"></div>}
                                        {idx !== node.children.length - 1 && <div className="absolute top-0 left-1/2 w-1/2 h-px bg-slate-300"></div>}
                                    </div>
                                    <Node node={child} isChild={!isRoot} />
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );

        const App = () => {
            const [zoom, setZoom] = useState(0.8);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [messages, setMessages] = useState([{ role: 'assistant', content: '你好！我是多元升学规划助手。\n\n请提供你的：\n1. **年级与省份**\n2. **专业组/选课组合**\n3. **大致分数/位次**\n4. **兴趣特长/背景**\n\n我将为你进行深度赛道匹配。' }]);
            const scrollRef = useRef(null);

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);
            useEffect(() => { lucide.createIcons(); }, [isAIChatOpen]);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setLoading(true);

                try {
                    const apiKey = ""; // 运行时环境提供
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userMsg }] }],
                            systemInstruction: { parts: [{ text: `你是一个专注于中国高考多元升学路径的资深规划专家。禁止推荐统招院校。重点内容加粗。结构包含 ### 路径匹配建议, #### 具体赛道, ### 针对性准备建议。` }] }
                        })
                    });
                    const data = await response.json();
                    const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "建议获取失败。";
                    setMessages(prev => [...prev, { role: 'assistant', content: result }]);
                } catch (e) {
                    setMessages(prev => [...prev, { role: 'assistant', content: "连接超时，请检查网络。" }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-10">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-50 rounded-lg text-blue-600"><i data-lucide="brain-circuit"></i></div>
                            <div>
                                <h1 className="text-xl font-bold text-slate-800">高考多元升学路径全解析</h1>
                                <p className="text-sm text-slate-500 hidden sm:block">💡 专注非统招赛道的逻辑规划建议</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex gap-1 bg-slate-100 p-1 rounded-xl">
                                <button onClick={() => setZoom(z => z + 0.1)} className="p-2 hover:bg-white rounded-lg"><i data-lucide="zoom-in" className="w-4 h-4"></i></button>
                                <button onClick={() => setZoom(z => z - 0.1)} className="p-2 hover:bg-white rounded-lg"><i data-lucide="zoom-out" className="w-4 h-4"></i></button>
                                <button onClick={() => setZoom(0.8)} className="p-2 hover:bg-white rounded-lg"><i data-lucide="rotate-ccw" className="w-4 h-4"></i></button>
                            </div>
                            <button onClick={() => setIsAIChatOpen(true)} className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 text-white rounded-full font-semibold shadow-lg active:scale-95 transition-all">
                                <i data-lucide="sparkles" className="w-4 h-4"></i><span>AI 智能规划</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-auto relative bg-[#f8fafc] flex">
                        <div className="min-w-full min-h-full flex p-20 px-[450px]">
                            <div className="m-auto transition-transform duration-300" style={{ transform: `scale(${zoom})`, minWidth: 'max-content' }}>
                                <Node node={mindMapData} isRoot={true} />
                            </div>
                        </div>
                    </main>

                    {isAIChatOpen && (
                        <div className="fixed inset-y-0 right-0 w-full sm:w-[400px] bg-white shadow-2xl z-[100] flex flex-col border-l animate-in slide-in-from-right duration-300">
                            <div className="p-4 border-b flex justify-between items-center bg-blue-700 text-white shadow-md">
                                <div className="flex items-center gap-2"><i data-lucide="brain-circuit" className="w-5 h-5"></i><span className="font-bold">多元升学规划助手</span></div>
                                <button onClick={() => setIsAIChatOpen(false)} className="p-1 hover:bg-blue-600 rounded-full"><i data-lucide="x"></i></button>
                            </div>
                            <div className="bg-indigo-50 p-3 px-4 text-[11px] text-indigo-800 flex items-start gap-2 border-b">
                                <i data-lucide="info" className="w-3.5 h-3.5 mt-0.5"></i><p>专注非统招路径逻辑规划，结果仅供策略参考。</p>
                            </div>
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-4 bg-slate-50 scrollbar-hide">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[92%] p-3.5 rounded-2xl text-[13px] leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white' : 'bg-white text-slate-700 border border-slate-100'}`}>
                                            <FormattedText text={m.content} />
                                        </div>
                                    </div>
                                ))}
                                {loading && <div className="flex items-center gap-2 text-slate-400 text-[13px] ml-2"><i data-lucide="loader-2" className="animate-spin w-4 h-4"></i>分析中...</div>}
                            </div>
                            <div className="p-4 border-t bg-white">
                                <div className="flex gap-2">
                                    <textarea rows="2" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSend())} placeholder="输入：年级/省份/专业组/位次/特长..." className="flex-1 p-2.5 border rounded-xl text-sm focus:ring-2 focus:ring-blue-500 resize-none outline-none" />
                                    <button onClick={handleSend} disabled={loading} className="self-end bg-blue-600 text-white p-2.5 rounded-xl disabled:opacity-50"><i data-lucide="send" className="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t p-4 flex gap-4 overflow-x-auto justify-center text-[10px] sm:text-xs text-slate-600">
                        <div className="flex items-center gap-1.5 px-3 py-1 bg-blue-50 rounded-full border border-blue-100"><div className="w-2 h-2 rounded-full bg-blue-600"></div><span>核心主干</span></div>
                        <div className="flex items-center gap-1.5 px-3 py-1 bg-indigo-50 rounded-full border border-indigo-100"><div className="w-2 h-2 rounded-full bg-indigo-500"></div><span>拔尖优选</span></div>
                        <div className="flex items-center gap-1.5 px-3 py-1 bg-emerald-50 rounded-full border border-emerald-100"><div className="w-2 h-2 rounded-full bg-emerald-500"></div><span>政策照顾</span></div>
                        <div className="flex items-center gap-1.5 px-3 py-1 bg-amber-50 rounded-full border border-amber-100"><div className="w-2 h-2 rounded-full bg-amber-500"></div><span>特长专才</span></div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
