<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考多元升学路径全解析</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', "Microsoft YaHei", sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // ⚙️ 终极配置区：AI Studio 密钥 + 1.5 Flash 模型
        // ==========================================
        const CONFIG = {
            // 👇 请把您在 Google AI Studio 新生成的密钥粘贴在下面双引号里 👇
            GEMINI_API_KEY: "AIzaSyCEYaNwfE-0EfriveWg4FpCq3jLFzXN3Y4", 
            // 务必保持使用这个模型，它支持系统指令且速度最快
            MODEL_NAME: "gemini-1.5-flash" 
        };

        const mindMapData = {
            name: "中国高考多元升学",
            color: "bg-blue-600",
            children: [
                {
                    name: "拔尖与综合评价",
                    color: "bg-indigo-500",
                    description: "针对学霸及综合素质优秀者",
                    children: [
                        { name: "强基计划", detail: "85%高考 + 15%校测。基础学科拔尖人才，本硕博衔接培养。" },
                        { name: "综合评价", detail: "631模式。综合素质高、课外实践丰富，专业选择面更广。" }
                    ]
                },
                {
                    name: "政策定向专项",
                    color: "bg-emerald-500",
                    description: "促进教育公平的政策照顾",
                    children: [
                        { name: "国家专项", detail: "面向脱贫地区，部属/双一流高校承担。" },
                        { name: "地方专项", detail: "面向本省农村学生，省属重点高校承担。" },
                        { name: "高校专项", detail: "面向边远/农村勤奋生，独立申请，单独划线。" }
                    ]
                },
                {
                    name: "特长与免试类",
                    color: "bg-amber-500",
                    description: "拥有特殊天赋或长期专业训练",
                    children: [
                        { name: "保送生", detail: "奥赛国家队、外国语学校优等生、优秀运动员。直接免试入读。" },
                        { name: "艺术/体育类", detail: "专业课统考/校考 + 高考文化课。对文化课要求逐年提高。" }
                    ]
                },
                {
                    name: "国际/港澳类",
                    color: "bg-rose-500",
                    description: "跨境教育与国际化背景",
                    children: [
                        { name: "中外合作办学", detail: "不出国的留学，获得两校学位。费用较高，英语环境。" },
                        { name: "港澳高校", detail: "统招提前批或自主招生。部分学校需全英文面试。" }
                    ]
                },
                {
                    name: "职业与提前录取",
                    color: "bg-slate-500",
                    description: "实用技能与灵活路径",
                    children: [
                        { name: "高职单招", detail: "春季自主考试，录取后无需参加6月高考。侧重技能实操。" }
                    ]
                }
            ]
        };

        const FormattedText = ({ text }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className="flex flex-col gap-1.5">
                    {lines.map((line, lineIdx) => {
                        let content = line.trim();
                        if (!content) return <div key={lineIdx} className="h-2" />;
                        
                        let className = "text-[13px] leading-relaxed text-slate-700";
                        if (content.startsWith('#### ')) {
                            content = content.replace('#### ', '');
                            className = "text-[13px] font-bold mt-2 text-slate-800 flex items-center gap-1.5 before:content-[''] before:w-1 before:h-3 before:bg-blue-400 before:rounded-full";
                        } else if (content.startsWith('### ')) {
                            content = content.replace('### ', '');
                            className = "text-sm font-bold mt-3 mb-1 text-blue-700 border-b border-blue-50 pb-1 flex items-center gap-2";
                        } else if (content.startsWith('## ')) {
                            content = content.replace('## ', '');
                            className = "text-base font-extrabold mt-4 mb-2 text-slate-900 flex items-center gap-2";
                        }
                        
                        const parts = content.split(/(\*\*.*?\*\*)/g);
                        return (
                            <div key={lineIdx} className={className}>
                                {parts.map((part, i) => {
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                        return <strong key={i} className="font-bold text-blue-800 px-0.5 bg-blue-50 rounded">{part.slice(2, -2)}</strong>;
                                    }
                                    return part;
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const Node = ({ node, isRoot = false, isChild = false }) => (
            <div className="flex flex-col items-center">
                <div className={`relative p-4 rounded-xl shadow-lg border-2 transition-all cursor-default group
                    ${isRoot ? 'bg-blue-600 text-white border-blue-700 text-xl font-bold' : 
                    isChild ? 'bg-white text-slate-800 border-slate-200 hover:border-blue-300 hover:-translate-y-1' : 
                    `${node.color} text-white border-opacity-20 font-semibold`}
                    min-w-[140px] max-w-[180px] text-center z-10`}>
                    
                    {node.name}
                    {node.description && <div className="text-[10px] opacity-80 mt-1 font-normal leading-tight">{node.description}</div>}
                    
                    {node.detail && (
                        <div className="hidden group-hover:block absolute bottom-full left-1/2 -translate-x-1/2 mb-3 w-64 p-3 bg-slate-900 text-white text-xs rounded-lg z-50 shadow-2xl transition-opacity">
                            <div className="font-bold mb-1 border-b border-slate-700 pb-1">{node.name}</div>
                            <div className="leading-relaxed">{node.detail}</div>
                            <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-3 h-3 bg-slate-900 rotate-45"></div>
                        </div>
                    )}
                </div>
                
                {node.children && (
                    <div className="flex flex-col items-center">
                        <div className="w-px h-8 bg-slate-300"></div>
                        <div className="flex space-x-6 relative">
                            {node.children.map((child, idx) => (
                                <div key={idx} className="relative flex flex-col items-center">
                                    <div className="absolute top-0 left-0 right-0 flex justify-center">
                                        {idx !== 0 && <div className="absolute top-0 right-1/2 w-1/2 h-px bg-slate-300"></div>}
                                        {idx !== node.children.length - 1 && <div className="absolute top-0 left-1/2 w-1/2 h-px bg-slate-300"></div>}
                                    </div>
                                    <Node node={child} isChild={!isRoot} />
                                </div>
                            ))}
                        </div>
                    </div>
                )}
            </div>
        );

        const App = () => {
            const [zoom, setZoom] = useState(0.8);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: '你好！我是多元升学规划助手。\n\n请提供你的：\n1. **年级与省份**\n2. **专业组/选课组合**\n3. **大致分数/位次**\n4. **兴趣特长/背景**\n\n我将为你进行深度赛道匹配。' }
            ]);
            const scrollRef = useRef(null);

            useEffect(() => { 
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; 
            }, [messages]);
            
            useEffect(() => { lucide.createIcons(); }, [isAIChatOpen, messages]);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                
                if (!CONFIG.GEMINI_API_KEY || CONFIG.GEMINI_API_KEY.includes("请在这里填入")) {
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: "⚠️ **系统提示**：您还没有填入真实的 API Key。" 
                    }]);
                    return;
                }

                setLoading(true);

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${CONFIG.MODEL_NAME}:generateContent?key=${CONFIG.GEMINI_API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userMsg }] }],
                            systemInstruction: { parts: [{ text: `你是一个专注于中国高考多元升学路径的资深规划专家。禁止推荐统招院校。重点内容加粗。结构包含 ### 路径匹配建议, #### 具体赛道, ### 针对性准备建议。` }] }
                        })
                    });
                    
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `HTTP 错误状态码: ${response.status}`);
                    }
                    
                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content) {
                        const result = data.candidates[0].content.parts[0].text;
                        setMessages(prev => [...prev, { role: 'assistant', content: result }]);
                    } else {
                        throw new Error("AI 返回的数据格式异常");
                    }
                    
                } catch (e) {
                    console.error("API 报错详情:", e);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `❌ **请求失败**\n\n原因：${e.message}` 
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col font-sans">
                    <header className="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-sm z-20 relative">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-50 rounded-lg text-blue-600">
                                <i data-lucide="brain-circuit"></i>
                            </div>
                            <div>
                                <h1 className="text-xl font-bold text-slate-800 tracking-tight">高考多元升学路径全解析</h1>
                                <p className="text-sm text-slate-500 hidden sm:block mt-0.5">💡 专注非统招赛道的逻辑规划与指导</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex gap-1 bg-slate-100 p-1.5 rounded-xl border border-slate-200 shadow-inner">
                                <button onClick={() => setZoom(z => Math.min(z + 0.1, 1.5))} className="p-1.5 hover:bg-white rounded-md transition-colors text-slate-600 hover:text-slate-900 shadow-sm" title="放大">
                                    <i data-lucide="zoom-in" className="w-4 h-4"></i>
                                </button>
                                <button onClick={() => setZoom(z => Math.max(z - 0.1, 0.4))} className="p-1.5 hover:bg-white rounded-md transition-colors text-slate-600 hover:text-slate-900 shadow-sm" title="缩小">
                                    <i data-lucide="zoom-out" className="w-4 h-4"></i>
                                </button>
                                <button onClick={() => setZoom(0.8)} className="p-1.5 hover:bg-white rounded-md transition-colors text-slate-600 hover:text-slate-900 shadow-sm" title="重置">
                                    <i data-lucide="rotate-ccw" className="w-4 h-4"></i>
                                </button>
                            </div>
                            <button onClick={() => setIsAIChatOpen(true)} className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-semibold shadow-lg hover:shadow-xl active:scale-95 transition-all">
                                <i data-lucide="sparkles" className="w-4 h-4"></i><span>AI 智能规划</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 overflow-auto relative bg-[#f8fafc] flex custom-scrollbar">
                        <div className="min-w-full min-h-full flex p-10 lg:p-20 justify-center items-center">
                            <div className="transition-transform duration-300 origin-center" style={{ transform: `scale(${zoom})`, minWidth: 'max-content' }}>
                                <Node node={mindMapData} isRoot={true} />
                            </div>
                        </div>
                    </main>

                    {isAIChatOpen && (
                        <div className="fixed inset-y-0 right-0 w-full sm:w-[420px] bg-white shadow-2xl z-[100] flex flex-col border-l border-slate-200 transition-transform duration-300">
                            <div className="p-4 border-b flex justify-between items-center bg-blue-700 text-white shadow-md">
                                <div className="flex items-center gap-2">
                                    <i data-lucide="bot" className="w-5 h-5"></i>
                                    <span className="font-bold tracking-wide">升学规划 AI 助手</span>
                                </div>
                                <button onClick={() => setIsAIChatOpen(false)} className="p-1.5 hover:bg-white/20 rounded-lg transition-colors">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <div className="bg-amber-50 p-3 px-4 text-[12px] text-amber-800 flex items-start gap-2 border-b border-amber-100">
                                <i data-lucide="alert-circle" className="w-4 h-4 mt-0.5 shrink-0"></i>
                                <p>AI 分析基于大模型生成，专注非统招路径逻辑梳理，具体政策请以所在省份考试院当年官方发布为准。</p>
                            </div>
                            
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-5 bg-slate-50 custom-scrollbar pb-20">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[88%] p-3.5 rounded-2xl text-[14px] leading-relaxed shadow-sm ${
                                            m.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-br-sm' 
                                            : 'bg-white text-slate-700 border border-slate-200 rounded-bl-sm'
                                        }`}>
                                            <FormattedText text={m.content} />
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex items-center gap-2 text-slate-500 text-[13px] ml-2 bg-white w-max px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                                        <i data-lucide="loader-2" className="animate-spin w-4 h-4 text-blue-600"></i>
                                        <span>正在深度分析数据...</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="p-4 border-t border-slate-200 bg-white absolute bottom-0 w-full shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                                <div className="flex gap-2">
                                    <textarea 
                                        rows="2" 
                                        value={input} 
                                        onChange={(e) => setInput(e.target.value)} 
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                handleSend();
                                            }
                                        }} 
                                        placeholder="输入：年级/省份/专业组/位次/特长 (Shift+Enter换行)" 
                                        className="flex-1 p-3 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none outline-none custom-scrollbar transition-all bg-slate-50 focus:bg-white" 
                                    />
                                    <button 
                                        onClick={handleSend} 
                                        disabled={loading || !input.trim()} 
                                        className="self-end bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl disabled:opacity-50 disabled:hover:bg-blue-600 transition-colors shadow-sm"
                                    >
                                        <i data-lucide="send" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <footer className="bg-white border-t border-slate-200 p-4 flex gap-4 overflow-x-auto justify-center text-xs text-slate-600 z-10 custom-scrollbar">
                        <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-full border border-slate-200 shadow-sm hover:bg-slate-100 transition-colors cursor-default"><div className="w-2.5 h-2.5 rounded-full bg-blue-600"></div><span className="font-medium">核心主干</span></div>
                        <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-full border border-slate-200 shadow-sm hover:bg-slate-100 transition-colors cursor-default"><div className="w-2.5 h-2.5 rounded-full bg-indigo-500"></div><span className="font-medium">拔尖优选</span></div>
                        <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-full border border-slate-200 shadow-sm hover:bg-slate-100 transition-colors cursor-default"><div className="w-2.5 h-2.5 rounded-full bg-emerald-500"></div><span className="font-medium">政策照顾</span></div>
                        <div className="flex items-center gap-2 px-3 py-1.5 bg-slate-50 rounded-full border border-slate-200 shadow-sm hover:bg-slate-100 transition-colors cursor-default"><div className="w-2.5 h-2.5 rounded-full bg-amber-500"></div><span className="font-medium">特长专才</span></div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
