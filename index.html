<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考多元升学路径全解析</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', "Microsoft YaHei", sans-serif; overflow: hidden; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        /* 画布拖拽时的样式 */
        .cursor-grab { cursor: grab; }
        .cursor-grabbing { cursor: grabbing; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // 📊 高密度交互式数据模型
        // 增加了更深的层级和详尽的 keyPoints 供侧边栏展示
        // ==========================================
        const mindMapData = {
            name: "高考多元升学",
            color: "bg-blue-600",
            isOpenDefault: true,
            children: [
                {
                    name: "拔尖与综合评价",
                    color: "bg-indigo-500",
                    isOpenDefault: true,
                    description: "学霸与综合素质优生专属",
                    details: {
                        title: "拔尖与综合评价赛道",
                        tags: ["降分录取", "名校捷径", "重视素养"],
                        content: "该赛道打破了'一考定终身'，重点考察学生的学科特长、创新潜质和综合素养。是冲击 985/211 高校最具性价比的路径。"
                    },
                    children: [
                        { 
                            name: "强基计划", 
                            isOpenDefault: false,
                            details: {
                                title: "强基计划 (基础学科拔尖人才)",
                                tags: ["39所985", "本硕博衔接", "免除考研"],
                                content: "**录取公式**：85%高考成绩 + 15%校测成绩。\n\n**核心优势**：\n- 聚焦基础学科（数学、物理、化学、生物、历史、哲学等）。\n- 进校后单独编班，配备导师，实行本硕博衔接培养。\n- 不得转专业（通常限制转入非强基专业）。\n\n**适合人群**：高考成绩优异，或在五大学科竞赛中获得银牌及以上，且有志于国家重大战略领域的人才。"
                            },
                            children: [
                                { name: "I类：凭借高考成绩入围" },
                                { name: "II类：破格入围 (奥赛银牌+)" }
                            ]
                        },
                        { 
                            name: "综合评价",
                            isOpenDefault: false,
                            details: {
                                title: "综合评价招生 (631模式)",
                                tags: ["省属/部属高校", "专业面广", "降分幅度10-30分"],
                                content: "**录取公式**：60%高考成绩 + 30%校测(面试/笔试) + 10%高中学业水平考试成绩。\n\n**核心优势**：\n- 相比强基计划，专业选择更加广泛（含热门工科、经管类）。\n- 更加看重学生的奖项、社会实践、研究性学习成果。\n\n**准备建议**：高一高二需注重期末成绩排名，积极参加白名单赛事获取奖项，丰富综合素质评价档案。"
                            },
                            children: [
                                { name: "A类：面向全国招生院校 (如南科大)" },
                                { name: "B类：面向省内招生院校 (省属重点)" }
                            ]
                        }
                    ]
                },
                {
                    name: "政策定向专项",
                    color: "bg-emerald-500",
                    isOpenDefault: false,
                    description: "促进教育公平的政策照顾",
                    details: {
                        title: "三大专项计划",
                        tags: ["农村户籍", "降分幅度大", "限制报考条件"],
                        content: "国家为促进教育公平，针对贫困地区和农村户籍学生设立的专项扶持政策。符合条件的学生可享受低于统招线 10-50 分不等的录取优惠。"
                    },
                    children: [
                        { name: "国家专项", details: { title: "国家专项计划", content: "由中央部门所属高校和地方“双一流”建设高校承担。面向脱贫地区定向招生。" } },
                        { name: "地方专项", details: { title: "地方专项计划", content: "由各省(区、市)所属重点高校承担。面向本省实施区域的农村学生。" } },
                        { name: "高校专项", details: { title: "高校专项计划", content: "由教育部直属高校等自主招生，需要学生单独提交报名申请，通过初审和校测后方可享受降分。" } }
                    ]
                },
                {
                    name: "特长与免试类",
                    color: "bg-amber-500",
                    isOpenDefault: false,
                    description: "特殊天赋与长期专业训练",
                    children: [
                        { name: "保送生", details: { title: "保送生政策", content: "目前仅限五大学科奥赛国家集训队成员、外语类保送生（指定16所外国语中学）以及公安英烈子女等极少数群体。直接免除高考。" } },
                        { name: "高水平运动队", details: { title: "高水平运动队", content: "报考门槛大幅提高，通常要求国家一级运动员及以上，且文化课成绩要求逐步与普通统招线并轨。" } },
                        { name: "艺术类/体育类", details: { title: "艺体类统招", content: "随着艺考改革，文化课门槛逐年提高。绝大多数专业取消校考，采用省统考成绩。" } }
                    ]
                },
                {
                    name: "国际/中外合作",
                    color: "bg-rose-500",
                    isOpenDefault: false,
                    description: "跨境教育与国际化背景",
                    children: [
                        { name: "中外合作办学", details: { title: "中外合作办学 (4+0 / 2+2)", content: "不出国的留学。优势是降分幅度极大，能以较低的分数拿到名校或海外合作大学的学位证。劣势是学费昂贵（通常 5-10 万/年）。" } },
                        { name: "港澳高校内地招生", details: { title: "港澳高校", content: "分为两类：一类如港中大、港城大在提前批统招；另一类如港大、科大采用独立招生，需要全英文面试，不占用内地高考志愿名额。" } }
                    ]
                }
            ]
        };

        // ==========================================
        // 🧩 UI 组件：简易 Markdown 解析器
        // ==========================================
        const FormattedText = ({ text }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className="flex flex-col gap-1.5">
                    {lines.map((line, lineIdx) => {
                        let content = line.trim();
                        if (!content) return <div key={lineIdx} className="h-2" />;
                        
                        let className = "text-[13px] leading-relaxed text-slate-700";
                        if (content.startsWith('- ')) {
                            content = content.substring(2);
                            className = "text-[13px] leading-relaxed text-slate-700 pl-4 relative before:content-['•'] before:absolute before:left-0 before:text-slate-400";
                        } else if (content.startsWith('#### ')) {
                            content = content.replace('#### ', '');
                            className = "text-[13px] font-bold mt-2 text-slate-800 flex items-center gap-1.5 before:content-[''] before:w-1 before:h-3 before:bg-blue-400 before:rounded-full";
                        } else if (content.startsWith('### ')) {
                            content = content.replace('### ', '');
                            className = "text-sm font-bold mt-3 mb-1 text-blue-700 border-b border-blue-50 pb-1 flex items-center gap-2";
                        } else if (content.startsWith('## ')) {
                            content = content.replace('## ', '');
                            className = "text-base font-extrabold mt-4 mb-2 text-slate-900 flex items-center gap-2";
                        }
                        
                        const parts = content.split(/(\*\*.*?\*\*)/g);
                        return (
                            <div key={lineIdx} className={className}>
                                {parts.map((part, i) => {
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                        return <strong key={i} className="font-bold text-slate-900 bg-blue-50/50 px-1 rounded">{part.slice(2, -2)}</strong>;
                                    }
                                    return part;
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        };

        // ==========================================
        // 🧩 UI 组件：可交互的思维导图节点
        // ==========================================
        const Node = ({ node, isRoot = false, isChild = false, onNodeSelect, activeNodeName }) => {
            // 控制子节点的展开与收起
            const [isOpen, setIsOpen] = useState(node.isOpenDefault ?? true);
            const hasChildren = node.children && node.children.length > 0;
            const hasDetails = !!node.details;
            const isActive = activeNodeName === node.name;

            const handleNodeClick = (e) => {
                e.stopPropagation();
                if (hasDetails || hasChildren) {
                    onNodeSelect(node);
                }
            };

            const toggleOpen = (e) => {
                e.stopPropagation();
                setIsOpen(!isOpen);
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative group">
                        {/* 节点本体 */}
                        <div 
                            onClick={handleNodeClick}
                            className={`relative p-3.5 rounded-xl shadow-sm border-2 transition-all cursor-pointer select-none
                                ${isRoot ? 'bg-blue-600 text-white border-blue-700 text-lg font-bold shadow-blue-200/50' : 
                                isChild ? `bg-white text-slate-800 border-slate-200 hover:border-blue-400 hover:shadow-md ${isActive ? 'ring-2 ring-blue-400 border-blue-400 shadow-md' : ''}` : 
                                `${node.color} text-white border-transparent font-semibold shadow-md ${isActive ? 'ring-4 ring-blue-200' : 'hover:-translate-y-0.5'}`}
                                min-w-[150px] max-w-[200px] text-center z-10 flex flex-col items-center justify-center`}
                        >
                            <span className="leading-snug">{node.name}</span>
                            {node.description && <span className={`text-[10px] mt-1 font-normal leading-tight opacity-90 ${isChild ? 'text-slate-500' : 'text-white'}`}>{node.description}</span>}
                        </div>

                        {/* 展开/收起按钮 */}
                        {hasChildren && (
                            <div 
                                onClick={toggleOpen}
                                className={`absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border-2 rounded-full flex items-center justify-center cursor-pointer shadow-sm z-20 hover:bg-slate-50 hover:scale-110 transition-transform ${isRoot ? 'border-blue-600 text-blue-600' : 'border-slate-300 text-slate-500'}`}
                            >
                                <i data-lucide={isOpen ? "minus" : "plus"} className="w-3 h-3"></i>
                            </div>
                        )}
                        
                        {/* 详情提示小红点 */}
                        {hasDetails && !isRoot && (
                            <div className="absolute -top-1.5 -right-1.5 w-3 h-3 bg-red-400 rounded-full border-2 border-white shadow-sm" title="点击查看详情"></div>
                        )}
                    </div>
                    
                    {/* 子节点递归渲染 */}
                    <div className={`transition-all duration-300 origin-top overflow-hidden ${isOpen ? 'opacity-100 max-h-[1000px]' : 'opacity-0 max-h-0'}`}>
                        {hasChildren && (
                            <div className="flex flex-col items-center">
                                <div className="w-px h-8 bg-slate-300"></div>
                                <div className="flex space-x-6 relative pt-4">
                                    {node.children.map((child, idx) => (
                                        <div key={idx} className="relative flex flex-col items-center">
                                            {/* 水平连线 */}
                                            <div className="absolute top-0 left-0 right-0 flex justify-center -mt-4">
                                                {idx !== 0 && <div className="absolute top-0 right-1/2 w-1/2 h-px bg-slate-300"></div>}
                                                {idx !== node.children.length - 1 && <div className="absolute top-0 left-1/2 w-1/2 h-px bg-slate-300"></div>}
                                                <div className="absolute top-0 left-1/2 w-px h-4 bg-slate-300"></div>
                                            </div>
                                            <Node node={child} isChild={!isRoot} onNodeSelect={onNodeSelect} activeNodeName={activeNodeName} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // ==========================================
        // 🚀 主应用组件
        // ==========================================
        const App = () => {
            const [zoom, setZoom] = useState(0.85);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [selectedNode, setSelectedNode] = useState(null); // 控制详情侧边栏
            
            // 聊天状态
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: '你好！我是多元升学规划助手。\n\n请提供你的：\n1. **年级与省份**\n2. **专业组/选课组合**\n3. **大致分数/位次**\n4. **兴趣特长/背景**\n\n我将为你进行深度赛道匹配。' }
            ]);
            const scrollRef = useRef(null);

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);
            useEffect(() => { lucide.createIcons(); }, [isAIChatOpen, messages, selectedNode, zoom]);

            // 发送消息到本地后端
            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                
                setLoading(true);

                try {
                    // 🌟 保持请求你本地后端的配置不变 🌟
                    const response = await fetch('http://localhost:3000/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });
                    
                    if (!response.ok) throw new Error(`后端连接失败，状态码: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.reply) {
                        setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
                    } else {
                        throw new Error("后端没有返回有效数据");
                    }
                } catch (e) {
                    console.error("请求报错:", e);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `❌ **请求失败**\n\n原因：${e.message}\n\n👉 请检查 VS Code 里的终端，确认后端服务器(3000端口)还在运行。` 
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            // 处理节点点击
            const handleNodeSelect = (node) => {
                if (node.details) {
                    setSelectedNode(node);
                }
            };

            return (
                <div className="h-screen flex flex-col font-sans overflow-hidden bg-[#f8fafc]">
                    {/* 顶部导航 */}
                    <header className="bg-white border-b border-slate-200 px-6 py-3.5 flex justify-between items-center shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-50 rounded-lg text-blue-600 border border-blue-100">
                                <i data-lucide="map" className="w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-800 tracking-tight">高考多元升学路径全解析</h1>
                                <p className="text-xs text-slate-500 hidden sm:block mt-0.5">点击带有红点标记的节点查看硬核资料</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {/* 缩放控制台 */}
                            <div className="hidden md:flex gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200 shadow-inner">
                                <button onClick={() => setZoom(z => Math.min(z + 0.1, 1.5))} className="p-1.5 hover:bg-white rounded-lg transition-all text-slate-600 hover:text-blue-600 hover:shadow-sm" title="放大">
                                    <i data-lucide="zoom-in" className="w-4 h-4"></i>
                                </button>
                                <div className="flex items-center px-1 text-xs font-mono text-slate-400">{Math.round(zoom * 100)}%</div>
                                <button onClick={() => setZoom(z => Math.max(z - 0.1, 0.4))} className="p-1.5 hover:bg-white rounded-lg transition-all text-slate-600 hover:text-blue-600 hover:shadow-sm" title="缩小">
                                    <i data-lucide="zoom-out" className="w-4 h-4"></i>
                                </button>
                            </div>
                            {/* AI 呼出按钮 */}
                            <button onClick={() => setIsAIChatOpen(true)} className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full text-sm font-semibold shadow-lg hover:shadow-xl active:scale-95 transition-all">
                                <i data-lucide="sparkles" className="w-4 h-4"></i><span>AI 智能规划</span>
                            </button>
                        </div>
                    </header>

                    {/* 主体交互区 */}
                    <div className="flex-1 relative flex overflow-hidden">
                        
                        {/* 左侧：路径详情信息面板 (Drawer) */}
                        <div className={`absolute left-0 top-0 bottom-0 w-[380px] bg-white border-r border-slate-200 shadow-2xl z-20 transition-transform duration-300 ease-in-out flex flex-col ${selectedNode ? 'translate-x-0' : '-translate-x-full'}`}>
                            {selectedNode && (
                                <>
                                    <div className="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-start">
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-800 leading-tight mb-2">
                                                {selectedNode.details.title || selectedNode.name}
                                            </h2>
                                            {/* 渲染标签 */}
                                            {selectedNode.details.tags && (
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedNode.details.tags.map((tag, i) => (
                                                        <span key={i} className="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded border border-blue-200">
                                                            {tag}
                                                        </span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <button onClick={() => setSelectedNode(null)} className="p-1.5 hover:bg-slate-200 rounded-lg transition-colors text-slate-400 hover:text-slate-700">
                                            <i data-lucide="x" className="w-5 h-5"></i>
                                        </button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6 custom-scrollbar text-[14px]">
                                        <FormattedText text={selectedNode.details.content} />
                                    </div>
                                    <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-center">
                                        <button 
                                            onClick={() => {
                                                setIsAIChatOpen(true);
                                                setInput(`我想详细了解关于“${selectedNode.name}”的政策，我适合报考吗？`);
                                            }}
                                            className="w-full py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl font-medium text-sm transition-colors flex justify-center items-center gap-2 border border-indigo-200"
                                        >
                                            <i data-lucide="message-square" className="w-4 h-4"></i> 针对此路径向 AI 提问
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>

                        {/* 中央：思维导图画布区 */}
                        <main className="flex-1 overflow-auto relative custom-scrollbar w-full h-full cursor-grab active:cursor-grabbing">
                            <div className="min-w-max min-h-max p-20 flex justify-center items-start pt-32">
                                <div className="transition-transform duration-300 origin-top" style={{ transform: `scale(${zoom})` }}>
                                    <Node 
                                        node={mindMapData} 
                                        isRoot={true} 
                                        onNodeSelect={handleNodeSelect} 
                                        activeNodeName={selectedNode?.name} 
                                    />
                                </div>
                            </div>
                        </main>

                        {/* 右侧：AI 聊天面板 (Drawer) */}
                        <div className={`absolute right-0 top-0 bottom-0 w-full sm:w-[420px] bg-white border-l border-slate-200 shadow-2xl z-30 flex flex-col transition-transform duration-300 ease-in-out ${isAIChatOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="p-4 border-b flex justify-between items-center bg-blue-600 text-white shadow-sm shrink-0">
                                <div className="flex items-center gap-2">
                                    <i data-lucide="bot" className="w-5 h-5"></i>
                                    <span className="font-bold tracking-wide">AI 升学规划师</span>
                                </div>
                                <button onClick={() => setIsAIChatOpen(false)} className="p-1.5 hover:bg-white/20 rounded-lg transition-colors">
                                    <i data-lucide="x" className="w-5 h-5"></i>
                                </button>
                            </div>
                            
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-5 bg-slate-50 custom-scrollbar">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[88%] p-3.5 rounded-2xl text-[14px] leading-relaxed shadow-sm ${
                                            m.role === 'user' 
                                            ? 'bg-blue-600 text-white rounded-br-sm' 
                                            : 'bg-white text-slate-700 border border-slate-200 rounded-bl-sm'
                                        }`}>
                                            <FormattedText text={m.content} />
                                        </div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex items-center gap-2 text-slate-500 text-[13px] ml-2 bg-white w-max px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                                        <i data-lucide="loader-2" className="animate-spin w-4 h-4 text-blue-600"></i>
                                        <span>正在深度分析数据...</span>
                                    </div>
                                )}
                            </div>
                            
                            <div className="p-4 border-t border-slate-200 bg-white shrink-0">
                                <div className="flex gap-2">
                                    <textarea 
                                        rows="2" 
                                        value={input} 
                                        onChange={(e) => setInput(e.target.value)} 
                                        onKeyDown={(e) => {
                                            if (e.key === 'Enter' && !e.shiftKey) {
                                                e.preventDefault();
                                                handleSend();
                                            }
                                        }} 
                                        placeholder="输入：年级/省份/成绩/特长 (Shift+Enter换行)" 
                                        className="flex-1 p-3 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none outline-none custom-scrollbar transition-all bg-slate-50 focus:bg-white" 
                                    />
                                    <button 
                                        onClick={handleSend} 
                                        disabled={loading || !input.trim()} 
                                        className="self-end bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl disabled:opacity-50 disabled:hover:bg-blue-600 transition-colors shadow-sm"
                                    >
                                        <i data-lucide="send" className="w-5 h-5"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
