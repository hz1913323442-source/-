                        content: "### 🔍 赛道解析\n这一类路径主要包括**中外合作办学项目**和**港澳高校内地招生**。本质上是把高考成绩与国际化培养、英文授课、跨境升学资源结合起来，不完全等同于传统意义上的“出国留学”，但整体都带有更强的国际化取向。\n\n### 🎯 适合人群\n- 家庭可以承担更高学费与生活成本。\n- 英语能力较强，适应双语或全英文环境。\n- 对国际化课程、海外读研或跨境就业有明确兴趣。\n\n### 💡 核心特点\n- **路径差异明显**：中外合作办学更偏国内培养体系里的国际化项目，港澳高校则是独立申请或提前批录取。\n- **信息不对称强**：很多家长只看到“分数可能更友好”，但忽略了语言、学费、培养方式和后续深造差异。\n- **决策更看匹配度**：不只是看能不能录上，更要看学生是否真的适应国际化环境。\n\n### 🗓️ 行动建议\n建议把这一类路径和家庭预算、英语能力、未来读研方向放在一起评估，不要只因为“看起来更容易进名校”就仓促决定。"
                    },
                    children: [
                        { name: "中外合作办学", details: { title: "中外合作办学 (不出国的留学)", tags: ["高分低就利器", "学费昂贵", "全英教学"], content: "### 🔍 赛道解析\n国内高校与国外高校联合办学的模式。形式包括独立设置的中外合作大学（如昆山杜克大学、上海纽约大学、西交利物浦、宁波诺丁汉等），以及普通高校下设的中外合作办学项目（如某985大学的“中外合作办学专业”）。\n\n### 🎯 适合人群\n- **家庭经济条件优越**的学生。\n- 英语基础较好，适应全英文授课环境。\n- 有明确的出国读研打算，需要国际化背景和海外大学文凭做跳板。\n\n### 💡 核心优势\n- **降分进名校**：录取分数线通常比该校的普通专业低 10-30 分，甚至更多。\n- **双学位认证**：毕业后通常能同时获得国内高校的毕业证/学位证，以及国外合作高校的学位证。\n- 昆山杜克、上纽大等采用独立招生模式（需提前网报并参加全英文校园日活动），不占用普通高考志愿名额。\n\n### ⚠️ 风险与限制\n- **学费高昂**：通常在 5万-12万元人民币/年 不等，4年下来开销巨大。\n- **无法转专业**：许多中外合作办学项目录取后，明确规定本科期间不可以在学校内部转入普通专业。" } },
                        { name: "港澳高校内地招生", details: { title: "港澳高校报考", tags: ["国际排名高", "双轨并行", "面试考核"], content: "### 🔍 赛道解析\n香港和澳门的大学面向内地高考生招生，属于“不出境的留学”。\n\n### 💡 两种截然不同的录取模式\n1. **统招提前批**：香港中文大学、香港城市大学。这两所学校**不需要单独报名和面试**，直接在高考志愿的“提前批”填报，凭高考纯分数录取。没考上也不影响后续内地大学录取。\n2. **独立招生**：香港大学、香港科技大学、香港理工大学、澳门大学等。这些学校**不占用内地高考志愿填报系统**。\n   - 需要学生在高考前，去学校官网单独全英文填写申请表。\n   - 高考成绩公布后，学校会划定面试线。入围者需参加**全英文无领导小组面试**。\n\n### 🎯 适合人群\n- 英语极强（很多港校要求高考英语单科必须在120分或130分以上）。\n- 独立生活能力强，视野开阔，能适应高压的全英文学术环境。\n\n### ⚠️ 风险与限制\n- **生活成本极高**：香港的学费加生活费通常在 20万-30万元人民币/年，且宿舍极难申请。\n- 竞争极其惨烈：港大、科大等顶级港校的实际录取分数，往往接近甚至超过内地的华东五校（复交浙科南）。" } }
                    ]
                }
            ]
        };

        const normalizeKeyword = (value = '') => value.toLowerCase().replace(/\s+/g, '');
        const uniqueOptions = (values = []) => [...new Set(values.filter(Boolean))].sort((a, b) => a.localeCompare(b, 'zh-CN'));
        const uniqueValues = (values = []) => {
            const seen = new Set();
            return values.filter((value) => {
                if (!value || seen.has(value)) return false;
                seen.add(value);
                return true;
            });
        };
        const excludedPathwayLabels = new Set(['普通统招', '校内国际升学路径']);
        const tagDisplayMap = {
            '少年班': '少年班/创新班',
            '创新班': '少年班/创新班'
        };
        const pathwayDisplayMap = {
            '医学部综合评价': '综合评价（医学部）',
            '综合评价(631)': '综合评价（631）',
            '综合评价(校园日)': '综合评价（校园日）',
            '综合评价(上海)': '综合评价（上海）',
            '综合评价(山东)': '综合评价（山东）',
            '综合评价(广东)': '综合评价（广东）',
            '综合评价(广东/部分项目)': '综合评价（广东）',
            '综合评价(江苏)': '综合评价（江苏）',
            '综合评价(部分项目)': '综合评价（部分项目）',
            '综合评价(部分省份/项目)': '综合评价（部分项目）',
            '三位一体(浙江)': '三位一体',
            '自主招生': '自主申请',
            '自主招生(面试)': '自主申请',
            '自主招生(高考直报)': '自主申请',
            '自主申请(港澳)': '港澳自主申请',
            '普通申请': '自主申请',
            '多元录取计划': '自主申请',
            '统招提前批志愿': '港校提前批',
            '少年班': '少年班/创新班',
            '校内国际升学路径': '国际化培养路径'
        };
        const getDisplayTagLabel = (tag = '') => tagDisplayMap[tag] || tag;
        const getDisplayPathwayLabel = (pathway = '') => {
            if (!pathway || excludedPathwayLabels.has(pathway)) return null;
            return pathwayDisplayMap[pathway] || pathway;
        };
        const getMeaningfulTags = (school = {}) => uniqueValues((school.tags || []).map(getDisplayTagLabel).filter(Boolean));
        const getMeaningfulPathways = (school = {}) => uniqueValues((school.pathways || []).map(getDisplayPathwayLabel).filter(Boolean));

        const buildSchoolSearchText = (school) => [
            school.name,
            ...(school.aliases || []),
            school.region,
            school.schoolType,
            ...(school.levels || []),
            ...getMeaningfulTags(school),
            ...getMeaningfulPathways(school),
            ...(school.majors || []),
            ...(school.specialNotes || []),
            ...((school.pathwayDetails || []).map(item => `${item.name} ${item.note}`)),
            ...((school.advisorProfile?.fitStudents) || []),
            ...((school.advisorProfile?.cautionPoints) || []),
            school.advisorProfile?.strategy || ''
        ].join(' ');

        const matchesSchoolKeyword = (school, keyword) => {
            if (!keyword.trim()) return true;
            return normalizeKeyword(buildSchoolSearchText(school)).includes(normalizeKeyword(keyword));
        };

        const normalizeAdvisorProfile = (advisorProfile) => {
            if (!advisorProfile || typeof advisorProfile !== 'object') return null;
            const fitStudents = Array.isArray(advisorProfile.fitStudents) ? advisorProfile.fitStudents.filter(Boolean) : [];
            const cautionPoints = Array.isArray(advisorProfile.cautionPoints) ? advisorProfile.cautionPoints.filter(Boolean) : [];
            const strategy = typeof advisorProfile.strategy === 'string' ? advisorProfile.strategy.trim() : '';
            if (!fitStudents.length && !cautionPoints.length && !strategy) return null;
            return {
                fitStudents,
                cautionPoints,
                strategy
            };
        };

        const normalizeSchoolRecord = (school = {}) => ({
            name: school.name || '未命名院校',
            aliases: Array.isArray(school.aliases) ? school.aliases : [],
            region: school.region || '地区待补充',
            schoolType: school.schoolType || '类型待补充',
            levels: Array.isArray(school.levels) ? school.levels : [],
            tags: Array.isArray(school.tags) ? school.tags : [],
            pathways: Array.isArray(school.pathways) ? school.pathways : [],
            pathwayDetails: Array.isArray(school.pathwayDetails)
                ? school.pathwayDetails.filter(item => item && typeof item === 'object').map(item => ({
                    name: item.name || '待补充',
                    note: item.note || '说明待补充'
                }))
                : [],
            majors: Array.isArray(school.majors) ? school.majors : [],
            specialNotes: Array.isArray(school.specialNotes) ? school.specialNotes : [],
            officialAdmissionUrl: school.officialAdmissionUrl || '#',
            officialSiteUrl: school.officialSiteUrl || '#',
            contactPhone: school.contactPhone || '',
            advisorProfile: normalizeAdvisorProfile(school.advisorProfile),
            dataStatus: school.dataStatus || 'core-seed'
        });

        const deriveAdvisorProfile = (school) => {
            if (school?.advisorProfile) {
                return {
                    fitStudents: school.advisorProfile.fitStudents.length ? school.advisorProfile.fitStudents : ['建议结合成绩区间、学科优势、城市偏好和赛道门槛综合评估。'],
                    cautionPoints: school.advisorProfile.cautionPoints.length ? school.advisorProfile.cautionPoints : ['建议以当年招生简章、招生计划和校测安排为准。'],
                    strategy: school.advisorProfile.strategy || '先确认招生路径是否真实匹配自己，再决定把它放在冲刺、匹配还是保底层。'
                };
            }
            const text = buildSchoolSearchText(school);
            const hasKeyword = (keyword) => text.includes(keyword);
            const fitStudents = [];
            const cautionPoints = [];
            let strategy = '建议把这所学校作为“赛道型目标院校”来研究，先确认招生简章，再结合分数、学科优势和地区意向判断优先级。';

            if (hasKeyword('强基计划') || hasKeyword('基础学科')) {
                fitStudents.push('高分段、数理基础扎实、愿意走长期学术培养路线的学生');
                cautionPoints.push('强基通常更适合真正接受基础学科路径的学生，不适合只把它当降分跳板');
                strategy = '优先核对强基招生专业、转专业限制和校测风格，再判断是否值得投入准备。';
            }
            if (hasKeyword('综合评价') || hasKeyword('校园日') || hasKeyword('631')) {
                fitStudents.push('校内成绩稳定、表达能力较强、愿意准备面试与材料的学生');
                cautionPoints.push('综合评价往往不是只看高考分，材料与面试准备不足会拉低胜率');
                strategy = '把高考成绩、校测要求、面试风格和省份政策放在一起比较，别只看学校名气。';
            }
            if (hasKeyword('高校专项') || hasKeyword('国家专项') || hasKeyword('地方专项')) {
                fitStudents.push('符合农村或专项政策条件、希望冲击更高平台的学生');
                cautionPoints.push('专项计划最关键的是资格条件和报名节点，材料不完整会直接失去机会');
                strategy = '先确认自己是否符合资格，再评估这条路径是否值得作为冲层主线。';
            }
            if (hasKeyword('港校') || hasKeyword('澳校') || hasKeyword('自主招生') || hasKeyword('面试')) {
                fitStudents.push('英语能力较强、家庭对港澳升学接受度高、能适应独立申请流程的学生');
                cautionPoints.push('港澳路径常常伴随面试、英文要求和更高成本，不能只看排名');
                strategy = '把语言、预算、面试准备和志愿系统关系一起评估，再决定是否重点投入。';
            }
            if (hasKeyword('中外合作') || hasKeyword('国际化') || hasKeyword('全英文')) {
                fitStudents.push('重视国际化课程体系、未来有海外深造或跨文化发展意向的学生');
                cautionPoints.push('中外合作院校往往学费更高，对语言和自驱力要求也更高');
                strategy = '重点比较学费、语言环境、升学出口和家庭接受度，而不只是看校名。';
            }
            if (hasKeyword('保送') || hasKeyword('外语类保送')) {
                fitStudents.push('竞赛、外语或特定学校体系背景明显的学生');
                cautionPoints.push('保送类路径对背景门槛要求强，不具备硬条件时不要误判为普适通道');
                strategy = '先确认自己是否真的满足保送资格，再看目标校是否值得作为主申目标。';
            }

            if (fitStudents.length === 0) {
                fitStudents.push('希望在学校平台、专业方向和多元升学机会之间做平衡的学生');
            }
            if (cautionPoints.length === 0) {
                cautionPoints.push('这类院校更适合放在整体志愿组合里比较，而不是脱离分数和地区单独判断。');
            }

            return {
                fitStudents: fitStudents.slice(0, 3),
                cautionPoints: cautionPoints.slice(0, 3),
                strategy
            };
        };

        const getSchoolLevelWeight = (school) => {
            const values = [...(school.levels || []), ...(school.tags || [])];
            if (values.some(item => item.includes('C9'))) return 42;
            if (values.some(item => item.includes('985'))) return 34;
            if (values.some(item => item.includes('强基'))) return 24;
            if (values.some(item => item.includes('双一流'))) return 18;
            if (values.some(item => item.includes('211'))) return 12;
            if (values.some(item => item.includes('综合评价强校'))) return 12;
            if (values.some(item => item.includes('独立法人'))) return 10;
            return 6;
        };

        const getSchoolRecommendationMeta = (school, context = {}) => {
            const query = (context.query || '').trim();
            const filters = context.filters || {};
            const normalizedQuery = normalizeKeyword(query);
            const nameNorm = normalizeKeyword(school.name);
            const aliasNorms = (school.aliases || []).map(normalizeKeyword);
            const reasons = [];
            let score = getSchoolLevelWeight(school);

            const pushReason = (reason) => {
                if (reason && !reasons.includes(reason) && reasons.length < 3) reasons.push(reason);
            };

            if (normalizedQuery) {
                if (nameNorm === normalizedQuery) {
                    score += 140;
                    pushReason('学校名精确命中');
                } else if (aliasNorms.includes(normalizedQuery)) {
                    score += 120;
                    pushReason('别名精确命中');
                } else if (nameNorm.includes(normalizedQuery)) {
                    score += 92;
                    pushReason('学校名高度相关');
                } else if (aliasNorms.some(alias => alias.includes(normalizedQuery))) {
                    score += 72;
                    pushReason('别名相关');
                } else if ((school.majors || []).some(major => normalizeKeyword(major).includes(normalizedQuery))) {
                    score += 52;
                    pushReason('专业方向匹配');
                } else if (getMeaningfulPathways(school).some(pathway => normalizeKeyword(pathway).includes(normalizedQuery))) {
                    score += 48;
                    pushReason('赛道关键词匹配');
                } else if ((school.tags || []).some(tag => normalizeKeyword(tag).includes(normalizedQuery))) {
                    score += 32;
                    pushReason('院校标签匹配');
                } else if ((school.specialNotes || []).some(note => normalizeKeyword(note).includes(normalizedQuery))) {
                    score += 18;
                    pushReason('报考提醒相关');
                }
            }

            if (filters.pathway && filters.pathway !== '全部赛道' && getMeaningfulPathways(school).includes(filters.pathway)) {
                score += 68;
                pushReason(`${filters.pathway} 赛道匹配`);
            }

            if (filters.region && filters.region !== '全部地区' && school.region === filters.region) {
                score += 22;
                pushReason(`${filters.region} 地区匹配`);
            }

            if (filters.schoolType && filters.schoolType !== '全部类型' && school.schoolType === filters.schoolType) {
                score += 18;
                pushReason('院校类型匹配');
            }

            if (school.advisorProfile) {
                score += 12;
                pushReason('含顾问判断');
            }

            score += Math.min(getMeaningfulPathways(school).length, 6) * 4;
            score += Math.min((school.pathwayDetails || []).length, 4) * 3;

            if (school.dataStatus === 'core-seed') score += 6;
            if (school.dataStatus?.startsWith('phase-')) score += 3;

            let label = '建议了解';
            if (score >= 150) label = '优先推荐';
            else if (score >= 105) label = '重点查看';
            else if (score >= 70) label = '值得比较';

            return { score, reasons, label };
        };

        const FormattedText = ({ text, isUser = false }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className="flex flex-col gap-1.5">
                    {lines.map((line, lineIdx) => {
                        let content = line.trim();
                        if (!content) return <div key={lineIdx} className="h-2" />;
                        
                        let className = isUser ? "text-[13px] leading-relaxed text-white" : "text-[13px] leading-relaxed text-slate-700";
                        if (content.startsWith('- ')) {
                            content = content.substring(2);
                            className = isUser ? "text-[13px] leading-relaxed text-white pl-4 relative before:content-['•'] before:absolute before:left-0 before:text-white/70" : "text-[13px] leading-relaxed text-slate-700 pl-4 relative before:content-['•'] before:absolute before:left-0 before:text-slate-400";
                        } else if (content.startsWith('#### ')) {
                            content = content.replace('#### ', '');
                            className = isUser ? "text-[13px] font-bold mt-2 text-white flex items-center gap-1.5 before:content-[''] before:w-1 before:h-3 before:bg-white before:rounded-full" : "text-[13px] font-bold mt-2 text-slate-900 flex items-center gap-1.5 before:content-[''] before:w-1 before:h-3 before:bg-slate-400 before:rounded-full";
                        } else if (content.startsWith('### ')) {
                            content = content.replace('### ', '');
                            className = isUser ? "text-sm font-bold mt-3 mb-1 text-white border-b border-white/20 pb-1 flex items-center gap-2" : "text-sm font-bold mt-3 mb-1 text-slate-900 border-b border-slate-200 pb-1 flex items-center gap-2";
                        } else if (content.startsWith('## ')) {
                            content = content.replace('## ', '');
                            className = isUser ? "text-base font-extrabold mt-4 mb-2 text-white flex items-center gap-2" : "text-base font-extrabold mt-4 mb-2 text-slate-900 flex items-center gap-2";
                        }
                        
                        // 使用更稳健的正则匹配
                        const parts = content.split(/(\*\*.*?\*\*|\[[^\]]+\]\([^)]+\)|https?:\/\/\S+)/g);
                        return (
                            <div key={lineIdx} className={className}>
                                {parts.map((part, i) => {
                                    if (!part) return null;
                                    // 1. 处理加粗 **text**
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                        return <strong key={i} className={isUser ? "font-bold text-white bg-white/20 px-1 rounded" : "font-bold text-slate-900 bg-slate-100 px-1 rounded"}>{part.slice(2, -2)}</strong>;
                                    }
                                    // 2. 处理 Markdown 链接 [文字](URL)
                                    if (part.startsWith('[') && part.includes('](')) {
                                        const match = part.match(/\[(.*?)\]\((.*?)\)/);
                                        if (match) {
                                            return <a key={i} href={match[2]} target="_blank" rel="noopener noreferrer" className={isUser ? "text-white underline font-bold decoration-2" : "text-[#4DA1A9] underline font-bold hover:text-[#2E5077] decoration-2 transition-colors"}>{match[1]}</a>;
                                        }
                                    }
                                    // 3. 处理纯文本 URL
                                    if (part.startsWith('http')) {
                                        return <a key={i} href={part} target="_blank" rel="noopener noreferrer" className={isUser ? "text-white underline break-all opacity-90" : "text-[#4DA1A9] underline break-all hover:text-[#2E5077] transition-colors"}>{part}</a>;
                                    }
                                    return part;
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const Node = ({ node, isRoot = false, isChild = false, onNodeSelect, activeNodeName, onNodeHover }) => {
            const [isOpen, setIsOpen] = useState(node.isOpenDefault ?? true);
            const hasChildren = node.children && node.children.length > 0;
            const hasDetails = !!node.details;
            const isActive = activeNodeName === node.name;

            const handleNodeClick = (e) => {
                e.stopPropagation();
                if (hasDetails || hasChildren) onNodeSelect(node);
            };

            const toggleOpen = (e) => {
                e.stopPropagation();
                setIsOpen(!isOpen);
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative group">
                        <div className={`floating-glow ${isRoot ? 'bg-[#cdeee3]' : isChild ? 'bg-[#eef7f4]' : 'bg-[#dff2ed]'} left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 group-hover:opacity-20 transition-opacity duration-300`}></div>
                        <div 
                            onClick={handleNodeClick}
                            onMouseEnter={() => onNodeHover?.(node.name)}
                            onMouseLeave={() => onNodeHover?.(null)}
                            className={`node-card relative p-4 rounded-[22px] border transition-all duration-300 cursor-pointer select-none
                                ${isRoot ? 'bg-[linear-gradient(180deg,#79D7BE_0%,#4DA1A9_100%)] text-white border-white/70 text-lg font-semibold shadow-[0_24px_50px_rgba(77,161,169,0.22)] hover:shadow-[0_28px_56px_rgba(77,161,169,0.28)]' : 
                                isChild ? `bg-[linear-gradient(180deg,rgba(255,255,255,0.98)_0%,rgba(248,246,242,0.95)_100%)] text-slate-800 border-white/80 hover:-translate-y-0.5 hover:shadow-[0_18px_36px_rgba(24,39,75,0.08)] ${isActive ? 'ring-2 ring-slate-300/80 border-slate-300 shadow-[0_12px_34px_rgba(24,39,75,0.1)]' : ''}` : 
                                `bg-[linear-gradient(180deg,rgba(255,255,255,0.98)_0%,rgba(238,249,245,0.96)_100%)] text-slate-900 border-[#d8ece5] font-semibold shadow-[0_16px_36px_rgba(77,161,169,0.08)] ${isActive ? 'ring-4 ring-[#cfece3]/95 border-[#9ed8cb] scale-[1.01] shadow-[0_22px_44px_rgba(77,161,169,0.14)]' : 'hover:-translate-y-0.5 hover:border-[#c4e3da] hover:shadow-[0_20px_42px_rgba(77,161,169,0.11)]'}`}
                                min-w-[160px] max-w-[220px] text-center z-10 flex flex-col items-center justify-center`}
                        >
                            <span className="leading-snug relative z-10">{node.name}</span>
                            {node.description && <span className="text-[10px] mt-1.5 font-normal leading-tight opacity-90 relative z-10 text-slate-500">{node.description}</span>}
                        </div>

                        {/* 🌟 详情提示气泡 */}
                        {hasDetails && !isRoot && (
                            <div className="absolute -top-10 left-1/2 -translate-x-1/2 opacity-0 group-hover:opacity-100 transition-opacity duration-200 pointer-events-none bg-white/96 text-slate-600 text-xs px-3 py-1.5 rounded-full whitespace-nowrap z-50 border border-slate-200 shadow-[0_10px_22px_rgba(24,39,75,0.08)]">
                                📄 点击查看详情
                                <div className="absolute top-full left-1/2 -translate-x-1/2 w-2 h-2 bg-white transform rotate-45 border-r border-b border-slate-200"></div>
                            </div>
                        )}

                        {hasChildren && (
                            <div 
                                onClick={toggleOpen}
                                className={`absolute -bottom-3 left-1/2 -translate-x-1/2 w-7 h-7 rounded-full flex items-center justify-center cursor-pointer z-20 hover:scale-110 transition-transform glass-panel ${isRoot ? 'text-slate-700 border-white/75' : 'text-slate-500 border-white/85'}`}
                            >
                                <span className="text-sm font-semibold leading-none">{isOpen ? '−' : '+'}</span>
                            </div>
                        )}
                        
                        {hasDetails && !isRoot && (
                            <div className="absolute -top-1.5 -right-1.5 w-3 h-3 bg-[#79D7BE] rounded-full border-2 border-white shadow-[0_6px_14px_rgba(121,215,190,0.24)] animate-pulse" title="点击查看详情"></div>
                        )}
                    </div>
                    
                    <div className={`transition-all duration-300 origin-top overflow-hidden ${isOpen ? 'opacity-100 max-h-[1000px]' : 'opacity-0 max-h-0'}`}>
                        {hasChildren && (
                            <div className="flex flex-col items-center">
                                <div className="w-px h-8 bg-gradient-to-b from-slate-300 to-slate-200"></div>
                                <div className="flex space-x-6 relative pt-4">
                                    {node.children.map((child, idx) => (
                                        <div key={idx} className="relative flex flex-col items-center">
                                            <div className="absolute top-0 left-0 right-0 flex justify-center -mt-4">
                                                {idx !== 0 && <div className="absolute top-0 right-1/2 w-1/2 h-px bg-gradient-to-l from-slate-300 to-slate-200"></div>}
                                                {idx !== node.children.length - 1 && <div className="absolute top-0 left-1/2 w-1/2 h-px bg-gradient-to-r from-slate-300 to-slate-200"></div>}
                                                <div className="absolute top-0 left-1/2 w-px h-4 bg-gradient-to-b from-slate-300 to-slate-200"></div>
                                            </div>
                                            <Node node={child} isChild={!isRoot} onNodeSelect={onNodeSelect} activeNodeName={activeNodeName} onNodeHover={onNodeHover} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const MobileNodeList = ({ node, depth = 0, onNodeSelect, activeNodeName }) => {
            const [isOpen, setIsOpen] = useState(depth < 1 ? true : !!node.isOpenDefault);
            const hasChildren = node.children && node.children.length > 0;
            const hasDetails = !!node.details;
            const isActive = activeNodeName === node.name;
            const levelTone = depth === 0
                ? 'from-[#fbfffd] to-[#f3fbf8] border-[#dceee7]'
                : depth === 1
                    ? 'from-[#f7fdfa] to-[#eaf7f3] border-[#d2e8e1]'
                    : 'from-[#fdfcf9] to-[#f5f2ec] border-slate-200/75';
            const levelLabel = depth === 0 ? '总览' : depth === 1 ? '主路径' : '细分项';

            return (
                <div className={`${depth === 0 ? 'space-y-4' : 'space-y-3'} ${depth > 0 ? 'pl-4 ml-1 border-l border-slate-200' : ''}`}>
                    <div className={`rounded-[24px] border bg-gradient-to-br ${levelTone} backdrop-blur-xl transition-all duration-300 shadow-[0_16px_36px_rgba(24,39,75,0.06)] ${isActive ? 'ring-2 ring-[#cfece3] border-[#9ed8cb] shadow-[0_18px_38px_rgba(77,161,169,0.1)]' : depth === 1 ? 'hover:border-[#bcded4] hover:shadow-[0_18px_38px_rgba(77,161,169,0.08)]' : ''}`}>
                        <div className="flex items-start gap-3 p-5">
                            <button
                                type="button"
                                onClick={() => {
                                    if (hasChildren) {
                                        setIsOpen(v => !v);
                                        return;
                                    }
                                    if (hasDetails) onNodeSelect(node);
                                }}
                                className="flex-1 text-left"
                            >
                                <div className="flex items-center gap-2.5">
                                    <span className={`h-2.5 w-2.5 rounded-full ${depth === 0 ? 'bg-[#4DA1A9]' : depth === 1 ? 'bg-[#79D7BE]' : 'bg-slate-400'} shadow-[0_4px_10px_rgba(77,161,169,0.18)]`}></span>
                                    <span className="inline-flex rounded-full border border-slate-200 bg-white px-2 py-0.5 text-[10px] tracking-[0.16em] text-slate-500 uppercase">{levelLabel}</span>
                                </div>
                                <h3 className={`mt-3 font-semibold leading-snug ${depth === 0 ? 'text-[22px] text-slate-900' : depth === 1 ? 'text-[19px] text-slate-900' : 'text-base text-slate-800'}`}>{node.name}</h3>
                                {node.description && <p className="mt-2 text-sm leading-7 text-slate-500">{node.description}</p>}
                            </button>
                            {(hasChildren || hasDetails) && (
                                <button
                                    type="button"
                                    onClick={() => {
                                        if (hasChildren) {
                                            setIsOpen(v => !v);
                                        } else if (hasDetails) {
                                            onNodeSelect(node);
                                        }
                                    }}
                                    className={`mt-0.5 h-10 w-10 shrink-0 rounded-full border flex items-center justify-center text-lg font-semibold transition-all ${hasChildren ? 'border-[#d6ebe4] bg-white text-[#4DA1A9] shadow-[0_8px_20px_rgba(77,161,169,0.08)]' : 'border-slate-200 bg-slate-50 text-slate-500'}`}
                                    aria-label={hasChildren ? (isOpen ? '收起' : '展开') : '查看详情'}
                                >
                                    {hasChildren ? (isOpen ? '−' : '+') : '›'}
                                </button>
                            )}
                        </div>
                        {hasDetails && (
                            <div className="px-5 pb-5 pt-1">
                                <button
                                    type="button"
                                    onClick={() => onNodeSelect(node)}
                                    className="w-full rounded-2xl bg-[#4DA1A9] text-white border border-[#4DA1A9] px-4 py-3.5 text-sm font-medium text-left shadow-[0_10px_24px_rgba(77,161,169,0.18)] hover:bg-[#438f96]"
                                >
                                    查看该路径详情与适配建议
                                </button>
                            </div>
                        )}
                    </div>
                    {hasChildren && isOpen && (
                        <div className="space-y-3">
                            {node.children.map((child, idx) => (
                                <MobileNodeList
                                    key={`${child.name}-${idx}`}
                                    node={child}
                                    depth={depth + 1}
                                    onNodeSelect={onNodeSelect}
                                    activeNodeName={activeNodeName}
                                />
                            ))}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [zoom, setZoom] = useState(0.85);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [selectedNode, setSelectedNode] = useState(null);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [hoveredNodeName, setHoveredNodeName] = useState(null);
            const [copiedIndex, setCopiedIndex] = useState(null);
            const [isExporting, setIsExporting] = useState(false);
            const [attachment, setAttachment] = useState(null); 
            const [isSearchModalOpen, setIsSearchModalOpen] = useState(false);
            const [searchSchool, setSearchSchool] = useState('');
            const [schoolDatabase, setSchoolDatabase] = useState([]);
            const [selectedSchoolProfile, setSelectedSchoolProfile] = useState(null);
            const [schoolFilters, setSchoolFilters] = useState({
                pathway: '全部赛道',
                region: '全部地区',
                schoolType: '全部类型'
            });
            const [schoolSortMode, setSchoolSortMode] = useState('recommended');
            const [schoolLibraryStatus, setSchoolLibraryStatus] = useState({
                loading: true,
                error: ''
            });
            const [isMobileView, setIsMobileView] = useState(window.innerWidth < 768);
            
            const fileInputRef = useRef(null);
            const exportRef = useRef(null);
            const scrollRef = useRef(null);
            const mainRef = useRef(null);
            const schoolModalBodyRef = useRef(null);

            const [messages, setMessages] = useState(() => {
                const saved = localStorage.getItem('gaokao_ai_chat_history');
                if (saved) {
                    try { return JSON.parse(saved); } catch (e) {}
                }
                return [
                    { role: 'assistant', content: '你好！我是多元升学规划助手。\n\n请提供你的：\n1. **年级与省份**\n2. **专业组/选课组合**\n3. **大致分数/位次**\n4. **兴趣特长/背景**\n\n我将为你进行深度赛道匹配。' }
                ];
            });

            const [isDragging, setIsDragging] = useState(false);
            const dragStart = useRef({ x: 0, y: 0 });
            const normalizedSchoolDatabase = schoolDatabase.map(normalizeSchoolRecord);
            const schoolQuery = searchSchool.trim();
            const hasSchoolCriteria = !!schoolQuery || schoolFilters.pathway !== '全部赛道' || schoolFilters.region !== '全部地区' || schoolFilters.schoolType !== '全部类型';
            const schoolRegionOptions = ['全部地区', ...uniqueOptions(normalizedSchoolDatabase.map(school => school.region))];
            const schoolPathwayOptions = ['全部赛道', ...uniqueOptions(normalizedSchoolDatabase.flatMap(school => getMeaningfulPathways(school)))];
            const schoolTypeOptions = ['全部类型', ...uniqueOptions(normalizedSchoolDatabase.map(school => school.schoolType))];
            const schoolLookupKeyword = selectedSchoolProfile?.name || schoolQuery;
            const sortSchoolResults = (results = []) => {
                const sorted = [...results];
                if (schoolSortMode === 'name') {
                    return sorted.sort((a, b) => a.school.name.localeCompare(b.school.name, 'zh-CN'));
                }
                if (schoolSortMode === 'pathways') {
                    return sorted.sort((a, b) => {
                        const pathwayDiff = getMeaningfulPathways(b.school).length - getMeaningfulPathways(a.school).length;
                        if (pathwayDiff !== 0) return pathwayDiff;
                        return b.recommendation.score - a.recommendation.score;
                    });
                }
                if (schoolSortMode === 'level') {
                    return sorted.sort((a, b) => {
                        const levelDiff = getSchoolLevelWeight(b.school) - getSchoolLevelWeight(a.school);
                        if (levelDiff !== 0) return levelDiff;
                        return b.recommendation.score - a.recommendation.score;
                    });
                }
                    return sorted.sort((a, b) => {
                    const scoreDiff = b.recommendation.score - a.recommendation.score;
                    if (scoreDiff !== 0) return scoreDiff;
                    return getMeaningfulPathways(b.school).length - getMeaningfulPathways(a.school).length;
                });
            };
            const baseRecommendationContext = {
                query: schoolQuery,
                filters: schoolFilters
            };
            const rankedSchoolResults = sortSchoolResults(
                normalizedSchoolDatabase
                .filter((school) => {
                    if (!matchesSchoolKeyword(school, schoolQuery)) return false;
                    if (schoolFilters.region !== '全部地区' && school.region !== schoolFilters.region) return false;
                    if (schoolFilters.schoolType !== '全部类型' && school.schoolType !== schoolFilters.schoolType) return false;
                    if (schoolFilters.pathway !== '全部赛道' && !getMeaningfulPathways(school).includes(schoolFilters.pathway)) return false;
                    return true;
                })
                .map((school) => ({
                    school,
                    recommendation: getSchoolRecommendationMeta(school, baseRecommendationContext)
                }))
            );
            const filteredSchools = rankedSchoolResults.map(item => item.school);
            const featuredSchoolResults = sortSchoolResults(
                normalizedSchoolDatabase.map((school) => ({
                    school,
                    recommendation: getSchoolRecommendationMeta(school, {
                        query: '',
                        filters: { pathway: '全部赛道', region: '全部地区', schoolType: '全部类型' }
                    })
                }))
            ).slice(0, 6);
            const selectedSchoolAdvisor = selectedSchoolProfile ? deriveAdvisorProfile(selectedSchoolProfile) : null;
            const selectedSchoolRecommendation = selectedSchoolProfile ? getSchoolRecommendationMeta(selectedSchoolProfile, baseRecommendationContext) : null;

            // --- 简历/图片解析逻辑 ---
            const processFile = async (file) => {
                const fileName = file.name;
                const fileType = file.type;

                try {
                    if (fileType.startsWith('image/')) {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            setAttachment({ name: fileName, type: 'image', preview: e.target.result, content: e.target.result });
                        };
                        reader.readAsDataURL(file);
                    } else if (fileType === 'application/pdf') {
                        const arrayBuffer = await file.arrayBuffer();
                        // 设置 worker
                        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
                        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                        let fullText = "";
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const textContent = await page.getTextContent();
                            fullText += textContent.items.map(s => s.str).join(' ') + "\n";
                        }
                        setAttachment({ name: fileName, type: 'pdf', content: fullText });
                    } else if (fileName.endsWith('.docx')) {
                        const arrayBuffer = await file.arrayBuffer();
                        const result = await mammoth.extractRawText({ arrayBuffer });
                        setAttachment({ name: fileName, type: 'word', content: result.value });
                    } else {
                        alert('目前仅支持图片、PDF和Word文档(.docx)');
                    }
                } catch (err) {
                    console.error("文件解析失败:", err);
                    alert("文件解析失败，请尝试上传其他格式或直接输入内容。");
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) processFile(file);
                // 重置 input 值以便重复上传同一文件
                e.target.value = '';
            };

            const updateSchoolFilter = (key, value) => {
                setSchoolFilters(prev => ({ ...prev, [key]: value }));
            };

            const openSchoolProfile = (school) => {
                setSelectedSchoolProfile(school);
                if (window.innerWidth < 1024) {
                    requestAnimationFrame(() => {
                        schoolModalBodyRef.current?.scrollTo({
                            top: 0,
                            behavior: 'smooth'
                        });
                    });
                }
            };

            const resetSchoolFilters = () => {
                setSearchSchool('');
                setSelectedSchoolProfile(null);
                setSchoolSortMode('recommended');
                setSchoolFilters({
                    pathway: '全部赛道',
                    region: '全部地区',
                    schoolType: '全部类型'
                });
            };

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);
            useEffect(() => { 
                if (window.lucide) {
                    window.lucide.createIcons(); 
                } else {
                    console.warn('Lucide icons not loaded yet');
                }
            }, [isAIChatOpen, messages, selectedNode, zoom, isSearchModalOpen, isMobileView, selectedSchoolProfile, schoolDatabase.length, schoolLibraryStatus.loading, schoolLibraryStatus.error]);

            useEffect(() => {
                const handleResize = () => {
                    const mobile = window.innerWidth < 768;
                    setIsMobileView(mobile);
                    setZoom(mobile ? 0.68 : 0.85);
                };
                handleResize();
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            useEffect(() => {
                if (!isSearchModalOpen) {
                    setSelectedSchoolProfile(null);
                }
            }, [isSearchModalOpen]);

            useEffect(() => {
                let cancelled = false;

                const loadSchoolDatabase = async () => {
                    setSchoolLibraryStatus({ loading: true, error: '' });
                    try {
                        const response = await fetch(`./data/schools.json?v=20260414`);
                        if (!response.ok) throw new Error(`院校库加载失败（${response.status}）`);
                        const data = await response.json();
                        if (!Array.isArray(data)) throw new Error('院校库格式不正确');
                        if (!cancelled) {
                            setSchoolDatabase(data);
                            setSchoolLibraryStatus({ loading: false, error: '' });
                        }
                    } catch (error) {
                        console.error('加载院校库失败:', error);
                        if (!cancelled) {
                            setSchoolDatabase([]);
                            setSchoolLibraryStatus({
                                loading: false,
                                error: '院校库加载失败。请优先使用 VS Code Live Preview / 本地服务器方式打开页面。'
                            });
                        }
                    }
                };

                loadSchoolDatabase();

                return () => {
                    cancelled = true;
                };
            }, []);

            // 🌟 拖拽平移画布功能
            const handleMouseDown = (e) => {
                if (e.button !== 0) return; // 只响应左键
                setIsDragging(true);
                dragStart.current = { x: e.clientX, y: e.clientY };
            };

            const handleMouseMove = (e) => {
                if (!isDragging || !mainRef.current) return;
                const deltaX = e.clientX - dragStart.current.x;
                const deltaY = e.clientY - dragStart.current.y;
                mainRef.current.scrollLeft -= deltaX;
                mainRef.current.scrollTop -= deltaY;
                dragStart.current = { x: e.clientX, y: e.clientY };
            };

            const handleMouseUp = () => {
                setIsDragging(false);
            };

            // 🌟 保存历史记录到本地 (最多保留5次对话，即1条欢迎语+10条问答)
            useEffect(() => {
                let toSave = messages;
                if (messages.length > 11) {
                    toSave = [messages[0], ...messages.slice(messages.length - 10)];
                }
                localStorage.setItem('gaokao_ai_chat_history', JSON.stringify(toSave));
            }, [messages]);

            // 🌟 导出聊天记录为长图功能
            const handleExport = () => {
                if (!exportRef.current || isExporting) return;
                setIsExporting(true);
                
                // 稍微延时，确保 React 渲染完成
                setTimeout(async () => {
                    try {
                        const canvas = await html2canvas(exportRef.current, {
                            scale: 2, // 提高清晰度
                            useCORS: true,
                            backgroundColor: '#f8fafc',
                            windowWidth: 600
                        });
                        const url = canvas.toDataURL('image/png');
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `高考升学AI规划报告.png`;
                        a.click();
                    } catch (e) {
                        console.error('生成图片失败', e);
                        alert('生成长图失败，请重试');
                    } finally {
                        setIsExporting(false);
                    }
                }, 100);
            };

            // 🌟 复制单个回答功能
            const copyToClipboard = (text, index) => {
                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(text);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    try { document.execCommand('copy'); } catch (err) {}
                    document.body.removeChild(textArea);
                }
                setCopiedIndex(index);
                setTimeout(() => setCopiedIndex(null), 2000);
            };

            const handleSend = async (customText = null) => {
                // 判断 customText 是否是字符串（因为 onClick 默认传 event 对象）
                const textToUse = typeof customText === 'string' ? customText : input.trim();
                if ((!textToUse && !attachment) || loading) return;
                
                let userContent = textToUse;
                let displayContent = userContent;
                
                // 🌟 新增：强制 AI 补充学校案例和链接的系统指令
                const systemPrompt = "\n\n(注意：在回答最后，请务必针对所提到的升学路径，给出一个真实的特定高校作为案例，并提供该校该政策的具体操作指导。核心要求：必须提供该校招生政策的官方网站直达链接，并使用标准的 Markdown 格式 [链接文字](URL) 呈现，确保用户可以直接点击跳转。)";
                
                // 如果有附件，将内容合并到发送给后端的文本中
                if (attachment) {
                    const fileText = attachment.type === 'image' ? "[图片已上传]" : `\n\n【上传的文件内容预览】:\n${attachment.content.substring(0, 2000)}${attachment.content.length > 2000 ? '...' : ''}`;
                    userContent = userContent ? `${userContent}${fileText}${systemPrompt}` : `请帮我分析这份${attachment.type === 'image' ? '图片' : '文档'}，并给出规划建议：${fileText}${systemPrompt}`;
                    
                    displayContent = attachment.type === 'image' 
                        ? (textToUse ? `${textToUse}\n(已上传图片: ${attachment.name})` : `(已上传图片: ${attachment.name})`)
                        : (textToUse ? `${textToUse}\n(已解析文档: ${attachment.name})` : `(已解析文档: ${attachment.name})`);
                } else {
                    userContent = `${userContent}${systemPrompt}`;
                }

                setInput('');
                setAttachment(null);
                setMessages(prev => [...prev, { role: 'user', content: displayContent }]);
                setLoading(true);

                try {
                    // 🌟 核心修改：已替换为你的 Render 公网后端地址 🌟
                    const response = await fetch('https://codingforgood.onrender.com/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userContent })
                    });
                    
                    if (!response.ok) throw new Error(`后端连接失败，状态码: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.reply) {
                        setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
                    } else {
                        throw new Error("后端没有返回有效数据");
                    }
                } catch (e) {
                    console.error("请求报错:", e);
                    setMessages(prev => [...prev, { 
                        role: 'assistant',

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        try {
            console.log('Attempting to render React app...');
            root.render(<App />);
            console.log('React app rendered successfully!');
        } catch (error) {
            console.error('React rendering failed:', error);
            alert('React 渲染失败: ' + error.message);
        }
    </script>
</body>
</html>
