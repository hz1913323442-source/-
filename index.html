                                content: "### 🔍 政策解析\n最经典的“631”模式录取公式：**60%高考成绩 + 30%校测(面试/笔试) + 10%高中学业水平考试成绩**。\n\n### 🎯 适合人群\n- **木桶型选手**：各科均衡，没有明显短板，平时大考成绩一直不错。\n- **软实力突出**：沟通表达能力强、有特长、有竞赛奖项（省奖或文科类白名单赛事）、参与过科研/社会实践。\n\n### 💡 核心优势\n- **专业自由度高**：相比强基计划，综评可以报考最热门的计算机、电子信息、金融、法学等专业。\n- **院校层次丰富**：既有面向全国的顶尖高校（如南科大、上科大、浙大），也有大量针对本省招生的省属重点高校。\n\n### ⚠️ 风险与限制\n- **地域限制**：大部分综合评价招生带有强烈的地域保护属性，主要面向本省生源（例如江苏、浙江、山东是综评大省）。\n- **材料繁琐**：初审极其看重个人陈述和高中三年的综合素质档案。\n\n### 🗓️ 备考建议\n- 高二下学期开始整理高中阶段的获奖证书、社会实践证明。\n- 高三冲刺期需分出少量精力练习“无领导小组讨论”等面试技巧。"

                {

                        tags: ["农村户籍限定", "巨幅降分", "资格审查严"],
                        content: "### 🔍 政策解析\n国家为了弥补城乡教育资源差距，专门为**特定区域的农村户籍学生**设立的定向升学通道。包含国家专项、地方专项和高校专项。\n\n### 🎯 适合人群\n- **必须具备农村户籍**（且需满足一定的年限要求）。\n- 高中三年必须在当地指定的县/区级中学连续就读并具有学籍。\n- 成绩处于中上游，渴望冲刺更高层次大学的农村学子。\n\n### 💡 核心优势\n- **极致的性价比**：符合条件的学生，最终录取分数可能比该校统招线低 10分-50分 不等，是实现“阶层跨越”的最佳跳板。\n\n### ⚠️ 风险与限制\n- **资格造假零容忍**：户籍和学籍审查极其严格，违规将取消高考资格。\n- **专业冷热不均**：部分专项计划投放的专业可能是农林矿地等偏冷门专业，或者带有毕业后回生源地就业的定向要求（需仔细看简章）。\n\n### 🗓️ 行动建议\n高三上学期务必向班主任或学校教务处确认自己是否符合三大专项的报考资格，避免错过申报节点（通常在4-5月）。"
                    },
                    children: [
                        { name: "国家专项", details: { title: "国家专项计划", tags: ["脱贫县限定", "985/211主力"], content: "### 🔍 赛道解析\n由中央部门所属高校和地方“双一流”建设高校承担。**定向招收脱贫地区（原集中连片特殊困难县、国家级扶贫开发重点县等）的学生**。\n\n### 💡 报考要点\n- 不需要单独报名校测，资格审核通过后，直接在高考志愿填报时选择相应的“国家专项批次”。\n- 录取依据纯高考分数，从高到低排序。" } },
                        { name: "地方专项", details: { title: "地方专项计划", tags: ["本省农村", "省属重点"], content: "### 🔍 赛道解析\n由各省(区、市)所属的重点高校承担。**面向本省实施区域的农村学生**。\n\n### 💡 报考要点\n- 主要倾斜给本省的省属重点大学（通常是省内一本）。\n- 同样无需校测，凭高考成绩录取，是省内农村学子进入本省优质高校的绝佳保障。" } },
                        { name: "高校专项", details: { title: "高校专项计划", tags: ["顶尖高校", "需单独网报", "可能含校测"], content: "### 🔍 赛道解析\n由教育部直属高校及其他自主招生试点高校（大多为985高校）独立开展。\n\n### 💡 报考要点\n- **流程最复杂**：需要在阳光高考平台单独提交报名申请。部分顶尖高校初审通过后，还要求高考后前往大学参加笔试/面试。\n- 降分力度由高校自主决定，通过考核后，高校会给予明确的降分录取优惠政策。" } }

                {

                    children: [
                        { name: "保送生", details: { title: "保送生政策", tags: ["直接免除高考", "金字塔尖", "名额极少"], content: "### 🔍 政策解析\n无需参加统一高考，直接被高校录取。近年来保送政策持续收紧，名额极少。\n\n### 🎯 谁有资格？\n目前主要集中在以下极少数群体：\n1. **五大学科奥赛国家集训队成员**（全国仅几百人，直接保送清北）。\n2. **指定16所外国语中学的优秀毕业生**（通常只能保送外语类专业）。\n3. 公安英烈子女、退役优秀运动员等特殊群体。\n\n### 💡 建议\n绝大多数普通高中生无需关注此赛道。如果不在上述名单内，请安心备战高考。" } },
                        { name: "艺术类/体育类", details: { title: "艺体类统招", tags: ["双线考核", "统考为主", "门槛提高"], content: "### 🔍 政策解析\n针对有艺术（美术、音乐、舞蹈、播音编导等）或体育专长的学生。录取考核公式通常包含**专业课成绩 + 文化课（高考）成绩**。\n\n### ⚠️ 最新政策趋势与风险\n- **文化课门槛大幅提高**：艺考不再是“成绩差”的避风港。教育部近年改革明确要求，逐步提高艺体生的高考文化课最低录取控制线。\n- **省统考取代校考**：绝大多数高校已取消自行组织的艺术类校考，直接采用各省的省级统考成绩。仅极少数独立设置的艺术院校（如央美、北电）保留校考。\n- **资金与精力成本高**：长期的集训需要高昂的培训费用，且高三上学期几乎全部在外集训，极度考验考生的文化课追赶能力。\n\n### 🗓️ 备考建议\n- 高二下学期必须明确是否走艺考路线，并寻找靠谱的集训机构。\n- 统考结束后（通常在高三的1月），必须立刻、全面回归文化课复习。" } }
                    ]
                },
                {
                    name: "国际/中外合作",
                    color: "bg-rose-500",
                    isOpenDefault: false,
                    description: "跨境教育与国际化背景",
                    children: [
                        { name: "中外合作办学", details: { title: "中外合作办学 (不出国的留学)", tags: ["高分低就利器", "学费昂贵", "全英教学"], content: "### 🔍 赛道解析\n国内高校与国外高校联合办学的模式。形式包括独立设置的中外合作大学（如昆山杜克大学、上海纽约大学、西交利物浦、宁波诺丁汉等），以及普通高校下设的中外合作办学项目（如某985大学的“中外合作办学专业”）。\n\n### 🎯 适合人群\n- **家庭经济条件优越**的学生。\n- 英语基础较好，适应全英文授课环境。\n- 有明确的出国读研打算，需要国际化背景和海外大学文凭做跳板。\n\n### 💡 核心优势\n- **降分进名校**：录取分数线通常比该校的普通专业低 10-30 分，甚至更多。\n- **双学位认证**：毕业后通常能同时获得国内高校的毕业证/学位证，以及国外合作高校的学位证。\n- 昆山杜克、上纽大等采用独立招生模式（需提前网报并参加全英文校园日活动），不占用普通高考志愿名额。\n\n### ⚠️ 风险与限制\n- **学费高昂**：通常在 5万-12万元人民币/年 不等，4年下来开销巨大。\n- **无法转专业**：许多中外合作办学项目录取后，明确规定本科期间不可以在学校内部转入普通专业。" } },
                        { name: "港澳高校内地招生", details: { title: "港澳高校报考", tags: ["国际排名高", "双轨并行", "面试考核"], content: "### 🔍 赛道解析\n香港和澳门的大学面向内地高考生招生，属于“不出境的留学”。\n\n### 💡 两种截然不同的录取模式\n1. **统招提前批**：香港中文大学、香港城市大学。这两所学校**不需要单独报名和面试**，直接在高考志愿的“提前批”填报，凭高考纯分数录取。没考上也不影响后续内地大学录取。\n2. **独立招生**：香港大学、香港科技大学、香港理工大学、澳门大学等。这些学校**不占用内地高考志愿填报系统**。\n   - 需要学生在高考前，去学校官网单独全英文填写申请表。\n   - 高考成绩公布后，学校会划定面试线。入围者需参加**全英文无领导小组面试**。\n\n### 🎯 适合人群\n- 英语极强（很多港校要求高考英语单科必须在120分或130分以上）。\n- 独立生活能力强，视野开阔，能适应高压的全英文学术环境。\n\n### ⚠️ 风险与限制\n- **生活成本极高**：香港的学费加生活费通常在 20万-30万元人民币/年，且宿舍极难申请。\n- 竞争极其惨烈：港大、科大等顶级港校的实际录取分数，往往接近甚至超过内地的华东五校（复交浙科南）。" } }
                    ]
                }
            ]
        };

        const FormattedText = ({ text }) => {
            if (!text) return null;
            const lines = text.split('\n');
            return (
                <div className="flex flex-col gap-1.5">
                    {lines.map((line, lineIdx) => {
                        let content = line.trim();
                        if (!content) return <div key={lineIdx} className="h-2" />;
                        
                        let className = "text-[13px] leading-relaxed text-slate-700";
                        if (content.startsWith('- ')) {
                            content = content.substring(2);
                            className = "text-[13px] leading-relaxed text-slate-700 pl-4 relative before:content-['•'] before:absolute before:left-0 before:text-slate-400";
                        } else if (content.startsWith('#### ')) {
                            content = content.replace('#### ', '');
                            className = "text-[13px] font-bold mt-2 text-slate-800 flex items-center gap-1.5 before:content-[''] before:w-1 before:h-3 before:bg-blue-400 before:rounded-full";
                        } else if (content.startsWith('### ')) {
                            content = content.replace('### ', '');
                            className = "text-sm font-bold mt-3 mb-1 text-blue-700 border-b border-blue-50 pb-1 flex items-center gap-2";
                        } else if (content.startsWith('## ')) {
                            content = content.replace('## ', '');
                            className = "text-base font-extrabold mt-4 mb-2 text-slate-900 flex items-center gap-2";
                        }
                        
                        const parts = content.split(/(\*\*.*?\*\*)/g);
                        return (
                            <div key={lineIdx} className={className}>
                                {parts.map((part, i) => {
                                    if (part.startsWith('**') && part.endsWith('**')) {
                                        return <strong key={i} className="font-bold text-slate-900 bg-blue-50/50 px-1 rounded">{part.slice(2, -2)}</strong>;
                                    }
                                    return part;
                                })}
                            </div>
                        );
                    })}
                </div>
            );
        };

        const Node = ({ node, isRoot = false, isChild = false, onNodeSelect, activeNodeName }) => {
            const [isOpen, setIsOpen] = useState(node.isOpenDefault ?? true);
            const hasChildren = node.children && node.children.length > 0;
            const hasDetails = !!node.details;
            const isActive = activeNodeName === node.name;

            const handleNodeClick = (e) => {
                e.stopPropagation();
                if (hasDetails || hasChildren) onNodeSelect(node);
            };

            const toggleOpen = (e) => {
                e.stopPropagation();
                setIsOpen(!isOpen);
            };

            return (
                <div className="flex flex-col items-center">
                    <div className="relative group">
                        <div 
                            onClick={handleNodeClick}
                            className={`relative p-3.5 rounded-xl shadow-sm border-2 transition-all cursor-pointer select-none
                                ${isRoot ? 'bg-blue-600 text-white border-blue-700 text-lg font-bold shadow-blue-200/50' : 
                                isChild ? `bg-white text-slate-800 border-slate-200 hover:border-blue-400 hover:shadow-md ${isActive ? 'ring-2 ring-blue-400 border-blue-400 shadow-md' : ''}` : 
                                `${node.color} text-white border-transparent font-semibold shadow-md ${isActive ? 'ring-4 ring-blue-200' : 'hover:-translate-y-0.5'}`}
                                min-w-[150px] max-w-[200px] text-center z-10 flex flex-col items-center justify-center`}
                        >
                            <span className="leading-snug">{node.name}</span>
                            {node.description && <span className={`text-[10px] mt-1 font-normal leading-tight opacity-90 ${isChild ? 'text-slate-500' : 'text-white'}`}>{node.description}</span>}
                        </div>

                        {hasChildren && (
                            <div 
                                onClick={toggleOpen}
                                className={`absolute -bottom-3 left-1/2 -translate-x-1/2 w-6 h-6 bg-white border-2 rounded-full flex items-center justify-center cursor-pointer shadow-sm z-20 hover:bg-slate-50 hover:scale-110 transition-transform ${isRoot ? 'border-blue-600 text-blue-600' : 'border-slate-300 text-slate-500'}`}
                            >
                                <i data-lucide={isOpen ? "minus" : "plus"} className="w-3 h-3"></i>
                            </div>
                        )}
                        
                        {hasDetails && !isRoot && (
                            <div className="absolute -top-1.5 -right-1.5 w-3 h-3 bg-red-400 rounded-full border-2 border-white shadow-sm" title="点击查看详情"></div>
                        )}
                    </div>
                    
                    <div className={`transition-all duration-300 origin-top overflow-hidden ${isOpen ? 'opacity-100 max-h-[1000px]' : 'opacity-0 max-h-0'}`}>
                        {hasChildren && (
                            <div className="flex flex-col items-center">
                                <div className="w-px h-8 bg-slate-300"></div>
                                <div className="flex space-x-6 relative pt-4">
                                    {node.children.map((child, idx) => (
                                        <div key={idx} className="relative flex flex-col items-center">
                                            <div className="absolute top-0 left-0 right-0 flex justify-center -mt-4">
                                                {idx !== 0 && <div className="absolute top-0 right-1/2 w-1/2 h-px bg-slate-300"></div>}
                                                {idx !== node.children.length - 1 && <div className="absolute top-0 left-1/2 w-1/2 h-px bg-slate-300"></div>}
                                                <div className="absolute top-0 left-1/2 w-px h-4 bg-slate-300"></div>
                                            </div>
                                            <Node node={child} isChild={!isRoot} onNodeSelect={onNodeSelect} activeNodeName={activeNodeName} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [zoom, setZoom] = useState(0.85);
            const [isAIChatOpen, setIsAIChatOpen] = useState(false);
            const [selectedNode, setSelectedNode] = useState(null);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const [messages, setMessages] = useState([
                { role: 'assistant', content: '你好！我是多元升学规划助手。\n\n请提供你的：\n1. **年级与省份**\n2. **专业组/选课组合**\n3. **大致分数/位次**\n4. **兴趣特长/背景**\n\n我将为你进行深度赛道匹配。' }
            ]);
            const scrollRef = useRef(null);

            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [messages]);
            useEffect(() => { lucide.createIcons(); }, [isAIChatOpen, messages, selectedNode, zoom]);

            const handleSend = async () => {
                if (!input.trim() || loading) return;
                const userMsg = input.trim();
                setInput('');
                setMessages(prev => [...prev, { role: 'user', content: userMsg }]);
                setLoading(true);

                try {
                    // 🌟 核心修改：已替换为你的 Render 公网后端地址 🌟
                    const response = await fetch('https://codingforgood.onrender.com/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: userMsg })
                    });
                    
                    if (!response.ok) throw new Error(`后端连接失败，状态码: ${response.status}`);
                    
                    const data = await response.json();
                    if (data.reply) {
                        setMessages(prev => [...prev, { role: 'assistant', content: data.reply }]);
                    } else {
                        throw new Error("后端没有返回有效数据");
                    }
                } catch (e) {
                    console.error("请求报错:", e);
                    setMessages(prev => [...prev, { 
                        role: 'assistant', 
                        content: `❌ **请求失败**\n\n原因：${e.message}\n\n👉 如果是第一次使用，可能需要等待约 30 秒让 Render 服务器苏醒。` 
                    }]);
                } finally {
                    setLoading(false);
                }
            };

            const handleNodeSelect = (node) => {
                if (node.details) setSelectedNode(node);
            };

            return (
                <div className="h-screen flex flex-col font-sans overflow-hidden bg-[#f8fafc]">
                    <header className="bg-white border-b border-slate-200 px-6 py-3.5 flex justify-between items-center shadow-sm z-30 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="p-2 bg-blue-50 rounded-lg text-blue-600 border border-blue-100">
                                <i data-lucide="map" className="w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-bold text-slate-800 tracking-tight">高考多元升学路径全解析</h1>
                                <p className="text-xs text-slate-500 hidden sm:block mt-0.5">点击带有红点标记的节点查看硬核资料</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="hidden md:flex gap-1 bg-slate-100 p-1 rounded-xl border border-slate-200 shadow-inner">
                                <button onClick={() => setZoom(z => Math.min(z + 0.1, 1.5))} className="p-1.5 hover:bg-white rounded-lg transition-all text-slate-600 hover:text-blue-600" title="放大"><i data-lucide="zoom-in" className="w-4 h-4"></i></button>
                                <div className="flex items-center px-1 text-xs font-mono text-slate-400">{Math.round(zoom * 100)}%</div>
                                <button onClick={() => setZoom(z => Math.max(z - 0.1, 0.4))} className="p-1.5 hover:bg-white rounded-lg transition-all text-slate-600 hover:text-blue-600" title="缩小"><i data-lucide="zoom-out" className="w-4 h-4"></i></button>
                            </div>
                            <button onClick={() => setIsAIChatOpen(true)} className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-full text-sm font-semibold shadow-lg hover:shadow-xl active:scale-95 transition-all">
                                <i data-lucide="sparkles" className="w-4 h-4"></i><span>AI 智能规划</span>
                            </button>
                        </div>
                    </header>

                    <div className="flex-1 relative flex overflow-hidden">
                        <div className={`absolute left-0 top-0 bottom-0 w-[380px] bg-white border-r border-slate-200 shadow-2xl z-20 transition-transform duration-300 ease-in-out flex flex-col ${selectedNode ? 'translate-x-0' : '-translate-x-full'}`}>
                            {selectedNode && (
                                <>
                                    <div className="p-5 border-b border-slate-100 bg-slate-50 flex justify-between items-start">
                                        <div>
                                            <h2 className="text-xl font-bold text-slate-800 leading-tight mb-2">{selectedNode.details.title || selectedNode.name}</h2>
                                            {selectedNode.details.tags && (
                                                <div className="flex flex-wrap gap-2">
                                                    {selectedNode.details.tags.map((tag, i) => (
                                                        <span key={i} className="px-2 py-0.5 bg-blue-100 text-blue-700 text-xs rounded border border-blue-200">{tag}</span>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                        <button onClick={() => setSelectedNode(null)} className="p-1.5 hover:bg-slate-200 rounded-lg transition-colors text-slate-400 hover:text-slate-700"><i data-lucide="x" className="w-5 h-5"></i></button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-6 custom-scrollbar text-[14px]">
                                        <FormattedText text={selectedNode.details.content} />
                                    </div>
                                    <div className="p-4 border-t border-slate-100 bg-slate-50 flex justify-center">
                                        <button onClick={() => { setIsAIChatOpen(true); setInput(`我想详细了解关于“${selectedNode.name}”的政策，我适合报考吗？`); }} className="w-full py-2.5 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 rounded-xl font-medium text-sm transition-colors flex justify-center items-center gap-2 border border-indigo-200">
                                            <i data-lucide="message-square" className="w-4 h-4"></i> 针对此路径向 AI 提问
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>

                        <main className="flex-1 overflow-auto relative custom-scrollbar w-full h-full cursor-grab active:cursor-grabbing">
                            <div className="min-w-max min-h-max p-20 flex justify-center items-start pt-32">
                                <div className="transition-transform duration-300 origin-top" style={{ transform: `scale(${zoom})` }}>
                                    <Node node={mindMapData} isRoot={true} onNodeSelect={handleNodeSelect} activeNodeName={selectedNode?.name} />
                                </div>
                            </div>
                        </main>

                        <div className={`absolute right-0 top-0 bottom-0 w-full sm:w-[420px] bg-white border-l border-slate-200 shadow-2xl z-30 flex flex-col transition-transform duration-300 ease-in-out ${isAIChatOpen ? 'translate-x-0' : 'translate-x-full'}`}>
                            <div className="p-4 border-b flex justify-between items-center bg-blue-600 text-white shadow-sm shrink-0">
                                <div className="flex items-center gap-2"><i data-lucide="bot" className="w-5 h-5"></i><span className="font-bold tracking-wide">AI 升学规划师</span></div>
                                <button onClick={() => setIsAIChatOpen(false)} className="p-1.5 hover:bg-white/20 rounded-lg transition-colors"><i data-lucide="x" className="w-5 h-5"></i></button>
                            </div>
                            <div ref={scrollRef} className="flex-1 overflow-y-auto p-4 space-y-5 bg-slate-50 custom-scrollbar">
                                {messages.map((m, i) => (
                                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                        <div className={`max-w-[88%] p-3.5 rounded-2xl text-[14px] shadow-sm ${m.role === 'user' ? 'bg-blue-600 text-white rounded-br-sm' : 'bg-white text-slate-700 border border-slate-200 rounded-bl-sm'}`}><FormattedText text={m.content} /></div>
                                    </div>
                                ))}
                                {loading && (
                                    <div className="flex items-center gap-2 text-slate-500 text-[13px] ml-2 bg-white w-max px-4 py-2 rounded-full border border-slate-200 shadow-sm"><i data-lucide="loader-2" className="animate-spin w-4 h-4 text-blue-600"></i><span>正在深度分析数据...</span></div>
                                )}
                            </div>
                            <div className="p-4 border-t border-slate-200 bg-white shrink-0">
                                <div className="flex gap-2">
                                    <textarea rows="2" value={input} onChange={(e) => setInput(e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } }} placeholder="输入：年级/省份/成绩/特长" className="flex-1 p-3 border border-slate-300 rounded-xl text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-none outline-none bg-slate-50 focus:bg-white" />
                                    <button onClick={handleSend} disabled={loading || !input.trim()} className="self-end bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl disabled:opacity-50 transition-colors shadow-sm"><i data-lucide="send" className="w-5 h-5"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
